<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca2000</title>
    <style>
        body {
            background: linear-gradient(160deg, #1e2d3d 0%, #2c3e50 55%, #34495e 100%);
            min-height: 100vh;
            color: #333;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #title-bar {
            display: flex; align-items: flex-end; justify-content: center;
            position: relative; width: 100%; max-width: 600px;
        }
        h1 {
            color: #ecf0f1;
            margin-bottom: 16px;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.45);
        }
        #version-badge {
            position: absolute; right: 0; bottom: 18px;
            font-size: 0.70em; color: rgba(255,255,255,1);
            font-family: monospace; letter-spacing: 0.03em;
            pointer-events: none;
        }

        /* ── 題庫 tabs (主畫面) ── */
        .bank-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 18px;
        }

        .bank-tab {
            padding: 5px 10px;
            border: 2px solid #ecf0f1;
            background: transparent;
            color: #ecf0f1;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .bank-tab:hover  { background: rgba(255,255,255,0.15); }
        .bank-tab.active { background: #ecf0f1; color: #2c3e50; font-weight: bold; }
        .bank-tab .tab-count { font-size: 0.78em; opacity: 0.65; margin-left: 3px; font-weight: normal; }

        /* ── 統計 & 題目區 ── */
        #stats-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #prep-container  { width: 100%; max-width: 600px; }
        #quiz-container  { width: 100%; max-width: 600px; }

        .quiz-card {
            background-color: #ecf0f1;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 12px;
            border: 4px solid transparent;
            box-shadow: 0 4px 14px rgba(0,0,0,0.13);
            transition: box-shadow 0.25s, transform 0.25s;
        }

        .quiz-card:focus-within {
            box-shadow: 0 10px 32px rgba(0,0,0,0.22), 0 0 0 3px rgba(52,152,219,0.32);
            transform: translateY(-3px);
        }

        .quiz-card.answered { background-color: #b0b5b9; }
        .quiz-card.correct  { border-color: #27ae60; background-color: #f0fff8; }
        .quiz-card.wrong    { border-color: #e74c3c; background-color: #fff0f0; }

        /* 可點選發音的單字 */
        .speakable {
            cursor: pointer;
            text-decoration: underline dotted #7f8c8d;
            transition: color 0.15s;
        }
        .speakable:hover { color: #2980b9; }

        .question-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 8px;
        }
        .question-header {
            font-size: 1.2em;
            font-weight: bold;
            padding-left: 10px;
            border-left: 4px solid #3498db;
            color: #2c3e50;
            flex: 1;
        }
        .original-no { font-size: 0.85em; color: #7f8c8d; white-space: nowrap; }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 3px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1a6fa8;
            box-shadow: 0 0 0 4px rgba(26,111,168,0.28), 0 2px 8px rgba(0,0,0,0.07);
            background-color: #d0eafc;
        }

        /* ── 按鈕在尾端，不懸浮 ── */
        .btn-group {
            margin: 8px 0 20px 0;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        #finish-btn          { background-color: #95a5a6; color: white; }
        #finish-btn.all-done { background-color: #27ae60; }
        #grade-btn           { background-color: #95a5a6; color: white; }
        #grade-btn.all-done  { background-color: #2ecc71; }
        #unlock-editor-btn   { background-color: #8e44ad; color: white; }

        .btn-group button { box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

        .btn-group button:hover:not(:disabled) {
            filter: brightness(1.08);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        }

        .btn-group button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        button:hover    { filter: brightness(1.08); }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; filter: none; }

        .answer-info {
            margin-top: 15px; padding: 10px;
            background-color: #fce4ec; border-radius: 5px;
            display: none; border-left: 5px solid #e91e63;
        }
        .show-ans-btn {
            background-color: #e67e22; color: white;
            padding: 6px 12px; font-size: 13px;
            margin-top: 10px; display: none;
        }

        .error-line { display: flex; gap: 16px; font-family: "Courier New", monospace; font-size: 0.92em; padding: 2px 0; }
        .error-line .err-ans   { min-width: 180px; }
        .error-line .err-input { color: #c0392b; }
        .google-btn { font-size: 0.75em; padding: 1px 6px; border-radius: 4px; border: 1px solid #4285f4; color: #4285f4; background: transparent; cursor: pointer; font-family: inherit; flex-shrink: 0; line-height: 1.6; }
        .google-btn:hover { background: #4285f4; color: #fff; }

        #download-log-btn {
            background-color: #3498db; color: white;
            padding: 8px 18px; font-size: 14px; margin-top: 12px;
        }
        #create-err-bank-btn {
            background-color: #e67e22; color: white;
            padding: 8px 18px; font-size: 14px; margin-top: 12px;
        }
        .quiz-timer-summary {
            font-size: 0.88em; color: #7f8c8d;
            background: #f4f6f8; border-radius: 6px;
            padding: 8px 12px; margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        /* ── 編輯區 ── */
        #editor-section {
            width: 100%; max-width: 600px;
            background-color: #34495e;
            padding: 25px; border-radius: 10px;
            margin: 20px 0 60px 0;
            color: #ecf0f1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }

        /* 編輯區題庫 tabs */
        .editor-bank-bar {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
        }
        .editor-bank-tab {
            padding: 6px 14px;
            border: 2px solid #7f8c8d;
            background: transparent; color: #bdc3c7;
            border-radius: 16px; cursor: pointer;
            font-size: 13px; font-family: inherit;
            transition: all 0.2s;
        }
        .editor-bank-tab:hover { border-color: #ecf0f1; color: #ecf0f1; }
        .editor-bank-tab.active { border-color: #3498db; background: #3498db; color: white; font-weight: bold; }

        .bank-manage-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 14px; flex-wrap: wrap;
        }
        .bank-manage-row input[type="text"] {
            flex: 1; min-width: 120px; margin-bottom: 0;
            padding: 8px 10px; font-size: 14px;
        }
        .sm-btn         { padding: 8px 14px; font-size: 13px; border-radius: 4px; color: white; border: none; cursor: pointer; font-family: inherit; }
        .btn-rename     { background-color: #3498db; }
        .btn-add        { background-color: #27ae60; }
        .btn-delete     { background-color: #e74c3c; }

        #update-btn        { background-color: #e67e22; color: white; flex: 1; font-weight: bold; }
        .editor-close-btn  {
            background: none; border: none; color: #ecf0f1;
            font-size: 1.5em; cursor: pointer; padding: 2px 6px; line-height: 1;
            border-radius: 4px; transition: color 0.15s;
        }
        .editor-close-btn:hover { color: #e74c3c; filter: none; }

        /* ── 懸浮完成鈕 ── */
        #fab-finish {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: #95a5a6;
            color: white;
            border-radius: 50px;
            padding: 11px 18px;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: none;
        }
        #fab-finish.all-done { background-color: #27ae60; }
        #fab-history {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background-color: #7f8c8d;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 18px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: none;
        }
        #fab-history:hover {
            filter: brightness(0.92);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        #fab-re-study {
            position: fixed;
            top: 68px;
            right: 20px;
            z-index: 999;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: none;
        }
        #fab-re-study:hover {
            filter: brightness(0.92);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        #fab-finish:hover {
            filter: brightness(0.92);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        @keyframes grade-pulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 0 8px rgba(46,204,113,0.35), 0 3px 10px rgba(0,0,0,0.2); }
        }
        #grade-btn.ready { animation: grade-pulse 0.9s ease-in-out 3; }

        /* ── 煙火粒子動畫 ── */
        @keyframes fw-fly {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            75%  { opacity: 0.8; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.15); opacity: 0; }
        }

        .empty-hint {
            color: #95a5a6; text-align: center;
            padding: 40px 20px; font-size: 1.1em;
        }

        /* ── 出題數選擇器 ── */
        .count-selector-card {
            background: #fff;
            border-radius: 14px;
            padding: 32px 28px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        .count-title    { font-size: 1.25em; color: #2c3e50; margin-bottom: 6px; }
        .count-subtitle { font-size: 0.95em; color: #7f8c8d; margin-bottom: 24px; }
        .count-options {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 28px;
        }
        .count-option-btn {
            padding: 13px 28px;
            border: 2px solid #dde4ea;
            background: transparent; color: #7f8c8d;
            border-radius: 10px; font-size: 1.15em; font-weight: bold;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .count-option-btn:hover  { border-color: #3498db; color: #3498db; }
        .count-option-btn.active {
            border-color: #3498db; background: #3498db; color: white;
            box-shadow: 0 3px 10px rgba(52,152,219,0.35);
        }
        .count-option-btn.rand:hover  { border-color: #e67e22; color: #e67e22; }
        .count-option-btn.rand.active {
            border-color: #e67e22; background: #e67e22; color: white;
            box-shadow: 0 3px 10px rgba(230,126,34,0.35);
        }
        .count-group-label { font-size: 0.82em; color: #95a5a6; margin: 0 0 8px; }
        .count-group-label + .count-options { margin-bottom: 16px; }
        .count-btn-row { display: flex; gap: 10px; margin-top: 12px; }
        .count-start-btn {
            flex: 1; background-color: #2ecc71; color: white;
            padding: 13px 0; font-size: 16px; font-weight: bold; border-radius: 8px;
        }
        .count-study-btn {
            flex: 1; background-color: #3498db; color: white;
            padding: 13px 0; font-size: 16px; font-weight: bold; border-radius: 8px;
        }
        #count-rest-hint {
            margin-top: 10px; font-size: 0.85em; color: #7f8c8d;
            text-align: center; display: none;
        }
        /* ── 學習模式 ── */
        .study-mode-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 100%; max-width: 600px; box-sizing: border-box; }
        .study-mode-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; border-bottom: 2px solid #ecf0f1; padding-bottom: 12px; }
        .study-mode-title  { font-size: 1.05em; font-weight: bold; color: #2c3e50; }
        .study-mode-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .study-list { font-family: "Courier New", monospace; font-size: 0.93em; line-height: 2; }
        .study-item { padding: 1px 0; }
        .study-no   { color: #aaa; font-size: 0.85em; min-width: 52px; display: inline-block; }
        .study-pos-zh { color: #555; }
        .study-mode-footer { margin-top: 8px; padding-top: 6px; border-top: 1px solid #ecf0f1; display: flex; gap: 8px; justify-content: flex-end; }

        /* ── APP 內建瀏覽器警告橫幅 ── */
        #iab-banner {
            width: 100%;
            background: #e67e22;
            color: white;
            padding: 14px 16px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
        }
        .iab-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .iab-url-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            align-items: center; margin-top: 8px;
        }
        #iab-url-input {
            flex: 1; min-width: 0; padding: 6px 8px;
            font-size: 13px; border: none; border-radius: 4px;
            color: #2c3e50; margin-bottom: 0;
        }
        .iab-copy-btn {
            background: white; color: #e67e22; font-weight: bold;
            border: none; border-radius: 4px; padding: 6px 14px;
            font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .iab-dismiss-btn {
            display: block; margin-top: 8px; margin-left: auto;
            background: rgba(0,0,0,0.18); color: white;
            border: none; border-radius: 4px; padding: 4px 14px;
            font-size: 12px; cursor: pointer;
        }

        /* ── 歷史批改結果（inline） ── */
        #history-section {
            width: 100%; max-width: 600px;
            background: #fff; border-radius: 10px;
            padding: 20px; margin: 20px 0 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .history-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 14px 0; }
        .history-header h3 { margin: 0; color: #2c3e50; font-size: 1.1em; }
        .history-close-btn {
            background: none; border: none; font-size: 1.3em; cursor: pointer;
            color: #95a5a6; padding: 0 4px; line-height: 1;
        }
        .history-close-btn:hover { color: #e74c3c; }
        .history-empty { color: #95a5a6; font-size: 0.9em; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
        .history-table th {
            background: #2c3e50; color: #ecf0f1;
            padding: 8px 6px; text-align: center;
        }
        .history-table td {
            padding: 7px 6px; border-bottom: 1px solid #ecf0f1;
            text-align: center; vertical-align: middle;
        }
        .history-table tbody tr:hover td { background: #f4f6f8; }
        /* ── 細節 Modal ── */
        #detail-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #detail-modal.open { display: flex; }
        #detail-modal-box {
            background: #fff; width: 90vw; height: 90vh;
            border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.35);
        }
        #detail-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; background: #2c3e50; color: #ecf0f1;
            font-size: 1em; font-weight: bold; flex-shrink: 0;
        }
        #detail-modal-header button {
            background: none; border: none; color: #ecf0f1;
            font-size: 1.3em; cursor: pointer; padding: 0 4px; line-height: 1;
        }
        #detail-modal-header button:hover { color: #e74c3c; }
        .detail-toolbar {
            display: flex; gap: 8px; padding: 10px 18px; flex-shrink: 0;
            border-bottom: 1px solid #ecf0f1;
        }
        .detail-toolbar button {
            background: #3498db; color: #fff; border: none;
            padding: 5px 16px; border-radius: 4px; font-size: 0.85em;
            cursor: pointer; font-family: inherit;
        }
        .detail-toolbar button:hover { background: #2980b9; }
        #detail-modal-content {
            flex: 1; overflow-y: auto; border: none; outline: none;
            padding: 14px 18px; font-size: 0.85em; color: #444;
            font-family: monospace; line-height: 1.8;
        }
        /* ── 封存 toast ── */
        #archive-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: #fff; padding: 9px 20px;
            border-radius: 20px; font-size: 0.85em; z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #archive-toast.show { opacity: 1; }
        /* ── 封存題庫 ── */
        #archive-btn {
            background: #607d8b; color: #fff; border: none; cursor: pointer;
            font-size: 0.85em; padding: 6px 14px; border-radius: 6px;
            margin-top: 10px; font-family: inherit;
        }
        #archive-btn:hover { background: #546e7a; }
        #archive-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #archive-modal.open { display: flex; }
        #archive-modal-box {
            background: #fff; width: 90vw; height: 90vh;
            border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.35);
        }
        #archive-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; background: #37474f; color: #ecf0f1;
            font-size: 1em; font-weight: bold; flex-shrink: 0;
        }
        #archive-modal-header button {
            background: none; border: none; color: #ecf0f1;
            font-size: 1.3em; cursor: pointer; padding: 0 4px; line-height: 1;
        }
        #archive-modal-header button:hover { color: #e74c3c; }
        #archive-modal-content {
            flex: 1; overflow-y: auto; padding: 14px 18px;
        }
        .archive-item {
            border: 1px solid #ddd; border-radius: 8px;
            margin-bottom: 12px; overflow: hidden;
        }
        .archive-item-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; background: #f5f7f9;
            cursor: pointer; user-select: none;
        }
        .archive-item-header:hover { background: #eef1f4; }
        .archive-item-meta { font-size: 0.8em; color: #888; margin-top: 3px; }
        .archive-item-detail {
            display: none; padding: 12px 14px;
            border-top: 1px solid #e8ecef; background: #fff;
        }
        .archive-item-detail.open { display: block; }
        .archive-toolbar {
            display: flex; gap: 8px; margin-bottom: 10px;
        }
        .archive-toolbar button {
            background: #3498db; color: #fff; border: none;
            padding: 5px 14px; border-radius: 4px; font-size: 0.83em;
            cursor: pointer; font-family: inherit;
        }
        .archive-toolbar button:hover { background: #2980b9; }
        .archive-vocab-list {
            font-family: monospace; font-size: 0.82em; color: #444;
            line-height: 1.8; white-space: pre-wrap;
            border: 1px solid #eee; border-radius: 4px;
            padding: 10px; background: #fafafa;
            max-height: 300px; overflow-y: auto;
        }
        #history-bottom-btn {
            background: #7f8c8d; color: #fff; border: none; cursor: pointer;
            font-size: 0.85em; padding: 6px 14px; border-radius: 6px;
            margin-top: 18px; font-family: inherit;
        }
        #history-bottom-btn:hover { background: #636e72; }

        #review-done-btn {
            background: #2980b9; color: #fff; border: none; cursor: pointer;
            font-size: 1em; font-weight: bold; padding: 12px 28px; border-radius: 8px;
            font-family: inherit; box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        #review-done-btn:hover { background: #1f6fa8; }

        function parsePipeData(pipe) {
            return pipe.split('|').map(function(s, i) {
                var p = s.trim().split(/\s+/);
                if (p.length < 2) return null;
                var wr = parseWordRest(p.slice(1).join(' '));
                return { no: i + 1, word: p[0], pos: wr.pos, zh: wr.zh };
            }).filter(Boolean);
        }

        // 解析詞性+中文部分，支援多詞性格式（n.刷子; v.刷）和傳統格式（adv. 國外）
        function parseWordRest(rest) {
            rest = rest.trim();
            var posRe = /^[a-z]+\./;
            if (!posRe.test(rest)) {
                // 不以詞性開頭，視第一個 token 為詞性，其餘為中文
                var p = rest.split(/\s+/);
                return { pos: p[0] || '', zh: p.slice(1).join(' ') };
            }
            // 以 "; " 切割多詞性段落，每段格式為 "pos.zh" 或 "pos. zh"
            var parts = rest.split(/;\s*/);
            var posList = [], zhList = [];
            parts.forEach(function(part) {
                part = part.trim();
                if (!part) return;
                var m = part.match(/^([a-z]+\.)\s*(.*)/);
                if (m) { posList.push(m[1]); if (m[2]) zhList.push(m[2]); }
                else   { zhList.push(part); }
            });
            return { pos: posList.join('; '), zh: zhList.join('; ') };
        }

        // 將 entry 序列化回文字（多詞性輸出緊湊格式 n.刷子; v.刷）
        function serializeEntry(item) {
            if (item.pos && item.pos.indexOf(';') >= 0) {
                var posParts = item.pos.split(/;\s*/);
                var zhParts  = item.zh.split(/;\s*/);
                var combined = posParts.map(function(p, i) {
                    return p + (zhParts[i] || '');
                }).join('; ');
                return item.no + ' ' + item.word + ' ' + combined;
            }
            return item.no + ' ' + item.word + ' ' + item.pos + ' ' + item.zh;
        }

        // 格式化題目顯示的詞性+中文（多詞性：n.刷子; v.刷　單詞性：n. 秋天）
        function formatPosZh(item) {
            if (item.pos && item.pos.indexOf(';') >= 0) {
                var posParts = item.pos.split(/;\s*/);
                var zhParts  = item.zh.split(/;\s*/);
                return posParts.map(function(p, i) { return p + (zhParts[i] || ''); }).join('; ');
            }
            return item.pos + ' ' + item.zh;
        }

        function defaultBankExists(prefix, count) {

                    var id = genId();
                    banks[id] = { name: d.prefix, data: data, source: '預設', createdAt: new Date().toISOString() };
                    added++;
                }
            });
            return added;
        }

        function initBanks() {
            const saved = localStorage.getItem('quiz_banks');
            banks = saved ? JSON.parse(saved) : {};
            const isFirstRun = Object.keys(banks).length === 0;
            var added = restoreDefaultBanks();   // 補入缺少的預設題庫
            if (isFirstRun) {

                var id = genId(); banks[id] = { name: 'Easy', data: [

                    { no: 2, word: 'good', pos: 'a.', zh: '好的' }
                ], source: '預設', createdAt: new Date().toISOString() };
                added++;
            }
            if (added > 0) saveBanks();
            const savedActive = localStorage.getItem('quiz_active_bank');
            activeBankId = (savedActive && banks[savedActive]) ? savedActive : Object.keys(banks)[0];
            localStorage.setItem('quiz_active_bank', activeBankId);

        // 封存指定題庫（從 banks 移除，加入 quizArchive）
        // spawnedInfoArr: [{ name, count }, ...]
        // reason: 封存原因字串（可選），例如 '全對'
        function archiveBank(bankId, spawnedInfoArr, reason) {
            var bank = banks[bankId];
            if (!bank) return;
            quizArchive.push({
                id: genId(),
                name: bank.name,
                data: bank.data.slice(),
                archivedAt: new Date().toISOString(),
                spawnedBanks: spawnedInfoArr || [],
                reason: reason || ''
            });
            if (quizArchive.length > ARCHIVE_MAX) {
                quizArchive.splice(0, quizArchive.length - ARCHIVE_MAX);
            }
            saveArchive();
            delete banks[bankId];
            saveBanks();
        }
