        function deleteBank() {
            if (Object.keys(banks).length <= 1) return alert('иҮіе°‘дҝқз•ҷдёҖеҖӢйЎҢеә«пјҢз„Ўжі•еҲӘйҷӨгҖӮ');
            if (!confirm('зўәе®ҡиҰҒеҲӘйҷӨгҖҢ' + banks[editorBankId].name + 'гҖҚпјҹжӯӨж“ҚдҪңз„Ўжі•йӮ„еҺҹгҖӮ')) return;
            const wasActive = (editorBankId === activeBankId);
            delete banks[editorBankId];
            saveBanks();
            editorBankId = Object.keys(banks)[0];
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
            // еҸӘжңүеҲӘжҺүзҡ„жҳҜдҪңзӯ”йЎҢеә«жҷӮжүҚйҮҚе•ҹжё¬й©—
            if (wasActive) {
                activeBankId = editorBankId;
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                document.getElementById('finish-btn').disabled = false;
                startNewQuiz();
            }
        }

        // еҗҢжӯҘз·ЁијҜеҚҖзҡ„ textarea иҲҮйЎҢеә«еҗҚзЁұж¬„
        function syncEditorContent() {
            const bank = banks[editorBankId];
            document.getElementById('bank-name-input').value = bank.name;
            document.getElementById('raw-input').value =
                bank.data.map(function(i) {
                    return i.no + ' ' + i.word + ' ' + i.pos + ' ' + i.zh;
                }).join('\n');
        }

        // в”Җв”Җ и§ЈйҺ–з·ЁијҜеҚҖ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function cancelUpdate() {
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('unlock-editor-btn').style.display = 'block';
        }

        function unlockEditor() {
            const pw = prompt("и«Ӣијёе…Ҙз®ЎзҗҶеҜҶзўјд»Ҙз·ЁијҜйЎҢзӣ®пјҡ");
            if (pw === "edit") {
                editorBankId = activeBankId;   // й җиЁӯз·ЁијҜзӣ®еүҚдҪңзӯ”зҡ„йЎҢеә«
                renderBankTabs('bank-tabs-editor');
                syncEditorContent();
                document.getElementById('editor-section').style.display = 'block';
                document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
                document.getElementById('unlock-editor-btn').style.display = 'none';
            } else if (pw !== null) {
                alert("еҜҶзўјйҢҜиӘӨпјҢз„Ўжі•й–Ӣе•ҹз·ЁијҜеҚҖгҖӮ");
            }
        }

        function updateVocabulary() {
            const text = document.getElementById('raw-input').value.trim();
            if (!text) return alert("и«Ӣијёе…ҘйЎҢзӣ®е…§е®№пјҒ");
            const newData = [];
            try {
                text.split('\n').forEach(function(line) {
                    // жё…йҷӨжү№ж”№жЁҷжіЁпјҡжҲӘжҺү tab еҫҢзҡ„е…§е®№пјҢеҶҚз§»йҷӨгҖҢијёе…Ҙ X зӮәйҢҜиӘӨзӯ”жЎҲгҖҚ
                    const cleaned = line.split('\t')[0]
                        .replace(/\s*ијёе…Ҙ\s+\S+\s+зӮәйҢҜиӘӨзӯ”жЎҲ.*$/, '').trim();
                    const p = cleaned.split(/\s+/);
                    if (p.length >= 4) newData.push({ no: p[0], word: p[1], pos: p[2], zh: p.slice(3).join(' ') });
                });
                if (newData.length === 0) throw new Error();
                banks[editorBankId].data = newData;
                saveBanks();
                activeBankId = editorBankId;   // зўәиӘҚжӣҙж–°еҫҢпјҢеҲҮжҸӣдҪңзӯ”йЎҢеә«зӮәеүӣе„Іеӯҳзҡ„йЎҢеә«
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                document.getElementById('finish-btn').disabled = false;
                document.getElementById('editor-section').style.display = 'none';
                document.getElementById('unlock-editor-btn').style.display = 'block';
                renderBankTabs('bank-tabs-main');
                startNewQuiz();
                alert("е·Іијүе…Ҙ " + newData.length + " йЎҢпјҢжё¬й©—е·ІйҮҚзҪ®гҖӮ");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                alert("и§ЈжһҗеӨұж•—пјҒж јејҸзҜ„дҫӢпјҡ1 word n. е–®еӯ—");
            }
        }

        // в”Җв”Җ е·Ҙе…·еҮҪејҸ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function todayStr() {
            var d = new Date();
            return d.getFullYear() +
                String(d.getMonth() + 1).padStart(2, '0') +
                String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = s[i]; s[i] = s[j]; s[j] = t;
            }
            return s;
        }

        function startNewQuiz() {
            quizStarted = true;
            var data = getActiveBank().data;
            if (!data || data.length === 0) {
                quizData = [];
                document.getElementById('quiz-container').innerHTML =
                    '<div class="empty-hint">жӯӨйЎҢеә«е°ҡз„ЎйЎҢзӣ®пјҢи«ӢеңЁз·ЁијҜеҚҖж–°еўһйЎҢзӣ®гҖӮ</div>';
                document.getElementById('fab-finish').style.display = 'none';
                return;
            }
            if (data.length > SPLIT_OPTIONS[0]) {
                showCountSelector();
                return;
            }
            doStartQuiz(data.length);
        }

        // в”Җв”Җ еҮәйЎҢж•ёйҒёж“ҮеҷЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        /** е»әз«Ӣ stops йҷЈеҲ—пјҡеҫһ SPLIT_OPTIONS еҸ–е°Ҹж–ј total зҡ„еҖјпјҢеҶҚеҠ дёҠ total */
        function buildCountStops(total) {
            var stops = [];
            SPLIT_OPTIONS.forEach(function(v) {
                if (v < total) stops.push(v);
            });
            stops.push(total);
            return stops;
        }

        function showCountSelector() {
            var bank  = getActiveBank();
            var total = bank.data.length;
            currentCountStops = buildCountStops(total);
            var defaultVal = currentCountStops.indexOf(50) !== -1 ? 50 : currentCountStops[Math.min(1, currentCountStops.length - 1)];
            currentSelectedCount = defaultVal;

            var optionBtns = currentCountStops.map(function(v) {
                return '<button class="count-option-btn' + (v === defaultVal ? ' active' : '') + '"' +
                       ' data-count="' + v + '" onclick="selectCount(' + v + ')">' + v + '</button>';
            }).join('');

            document.getElementById('quiz-container').innerHTML =
                '<div class="count-selector-card">' +
                  '<div class="count-title">гҖҢ' + bank.name + 'гҖҚе…ұ <strong>' + total + '</strong> йЎҢ</div>' +
                  '<div class="count-subtitle">йҖҷж¬ЎиҰҒиҖғе№ҫйЎҢпјҹ</div>' +
                  '<div class="count-options">' + optionBtns + '</div>' +
                  '<div class="count-btn-row">' +
                    '<button class="count-start-btn" onclick="confirmQuizStart()">й–Ӣе§ӢиҖғи©Ұ</button>' +
                  '</div>' +
                '</div>';
            document.getElementById('fab-finish').style.display = 'none';
        }

        function selectCount(n) {
            currentSelectedCount = n;
            document.querySelectorAll('.count-option-btn').forEach(function(btn) {
                btn.classList.toggle('active', parseInt(btn.dataset.count, 10) === n);
            });
        }

        function confirmQuizStart() {
            doStartQuiz(currentSelectedCount);
        }

        /** еҸ–еҫ—йЎҢеә«зҡ„гҖҢеҹәеә•еҗҚзЁұгҖҚпјҡеҺ»жҺүжң«е°ҫзҡ„ _ж•ёеӯ—пјҲйЎҢзӣ®ж•ёпјүпјҢдҝқз•ҷе…¶йӨҳйғЁеҲҶ */
        function bankBaseName(name) {
            return name.replace(/_\d+$/, '');
        }

        function doStartQuiz(n) {
            var bank    = getActiveBank();
            var allData = bank.data;
            var data    = allData.slice(0, n);

            // иӢҘжңүеү©йӨҳйЎҢзӣ®пјҡе»әз«ӢгҖҢжң¬ж¬Ў N йЎҢгҖҚйЎҢеә« + гҖҢеү©йӨҳгҖҚйЎҢеә«пјҢдёҰеҲҮжҸӣдҪңзӯ”йЎҢеә«
            if (allData.length > n) {
                var baseName = bankBaseName(bank.name);
                var rest     = allData.slice(n);
                var selId    = genId();
                var remId    = genId();
                banks[selId] = { name: baseName + '_' + todayStr() + '_' + n,           data: data.slice() };
                banks[remId] = { name: baseName + '_' + todayStr() + '_' + rest.length, data: rest };
                saveBanks();
                activeBankId = selId;   // дҪңзӯ”йЎҢеә«еҲҮжҸӣзӮәжң¬ж¬ЎйҒёе®ҡзҡ„ N йЎҢйЎҢеә«
                localStorage.setItem('quiz_active_bank', activeBankId);
                renderBankTabs('bank-tabs-main');
                renderBankTabs('bank-tabs-editor');
            }

            quizData      = shuffleArray(data);
            quizGraded    = false;
            quizStartTime = new Date();
            renderQuiz();
            saveProgress();
        }

        // в”Җв”Җ жёІжҹ“йЎҢзӣ® в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            quizData.forEach(function(item, idx) {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = 'q-' + idx;
                card.innerHTML =
                    '<div class="question-header">йЎҢзӣ® ' + (idx + 1) + '. ' + item.zh + 'пјҲ' + item.pos + 'пјү</div>' +
                    '<div class="original-no">е–®еӯ—еҺҹе§Ӣз·Ёиҷҹпјҡ' + item.no + '</div>' +
                    '<input type="text" id="input-' + idx + '" placeholder="ијёе…ҘиӢұж–Үе–®еӯ—..." oninput="saveProgress()">' +
                    '<button id="show-ans-btn-' + idx + '" class="show-ans-btn" onclick="toggleAnswer(' + idx + ')">йЎҜзӨәзӯ”жЎҲ</button>' +
                    '<div id="ans-info-' + idx + '" class="answer-info">жӯЈзўәзӯ”жЎҲпјҡ<strong>' + item.word + '</strong></div>';
                container.appendChild(card);
            });
            document.getElementById('fab-finish').style.display = 'block';
        }

        function saveProgress() {
            const answers = quizData.map(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return { wordValue: el ? el.value : '' };
            });
            localStorage.setItem('eng_quiz_progress2', JSON.stringify({
                bankId: activeBankId, quizData: quizData, answers: answers
            }));
        }

        // в”Җв”Җ е®ҢжҲҗжё¬й©— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function finishQuiz() {
            let firstEmpty = -1;
            const done = quizData.every(function(_, idx) {
                const w = document.getElementById('input-' + idx).value;
                if (w.length === 0 && firstEmpty === -1) firstEmpty = idx;
                return w.length > 0;
            });
            if (!done) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
            } else {
                document.getElementById('grade-btn').disabled = false;
            }
        }

        function fabFinish() {
            if (quizGraded || quizData.length === 0) return;
            let firstEmpty = -1;
            const done = quizData.every(function(_, idx) {
                const w = document.getElementById('input-' + idx).value;
                if (w.length === 0 && firstEmpty === -1) firstEmpty = idx;
                return w.length > 0;
            });
            if (!done) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
            } else {
                document.getElementById('grade-btn').disabled = false;
                document.querySelector('.btn-group').scrollIntoView({ behavior: 'smooth' });
                var gb = document.getElementById('grade-btn');
                gb.classList.remove('ready');
                void gb.offsetWidth;
                gb.classList.add('ready');
            }
        }

        // в”Җв”Җ жү№ж”№ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function gradeQuiz() {
            const total  = quizData.length;
            const errors = [];

            quizData.forEach(function(item, idx) {
                const inputWord = document.getElementById('input-' + idx).value.trim();
                const card      = document.getElementById('q-' + idx);
                const isMatch   = inputWord.toLowerCase() === item.word.toLowerCase();

                if (isMatch) {
                    card.classList.add('correct');
                } else {
                    card.classList.add('wrong');
                    document.getElementById('show-ans-btn-' + idx).style.display = 'block';
                    errors.push({ no: item.no, word: item.word, pos: item.pos, zh: item.zh, userWord: inputWord });
                }
            });

            const correctCount = total - errors.length;
            const pct          = Math.round(correctCount / total * 100);
            const statsPanel   = document.getElementById('stats-container');
            statsPanel.style.display = 'block';
            lastErrors = errors;

            // иЁҲжҷӮ
            var quizEndTime = new Date();
            var timerHtml   = '';
            if (quizStartTime) {
                var elapsed = quizEndTime - quizStartTime;
                var mins    = Math.floor(elapsed / 60000);
                var secs    = Math.floor((elapsed % 60000) / 1000);
                timerHtml =
                    '<div class="quiz-timer-summary">' +
                    'й–Ӣе§Ӣ ' + formatClock(quizStartTime) +
                    'гҖҖзөҗжқҹ ' + formatClock(quizEndTime) +
                    'гҖҖиҠұиІ» ' + mins + ' еҲҶ ' + secs + ' з§’' +
                    '</div>';
            }

            if (errors.length === 0) {
                statsPanel.innerHTML =
                    timerHtml +
                    '<div style="font-size:1.25em;text-align:center;padding:12px 0;line-height:2;">' +
                    'дҪ еҫҲеҠӘеҠӣпјҢе…Ёе°ҚдәҶпјҢдҪ еҫҲжЈ’</div>';
            } else {
                const errorHtml = errors.map(function(e) {
                    return '<div class="error-line">' +
                           '<span class="err-ans">' + e.no + ' ' + e.word + ' ' + e.pos + ' ' + e.zh + '</span>' +
                           '<span class="err-input">ијёе…Ҙ ' + e.userWord + ' зӮәйҢҜиӘӨзӯ”жЎҲ</span>' +
                           '</div>';
                }).join('');

                statsPanel.innerHTML =
                    timerHtml +
                    'зёҪе…ұ ' + total + ' йЎҢпјҢжӯЈзўә ' + correctCount + ' йЎҢпјҢйҢҜиӘӨ ' + errors.length + ' йЎҢгҖӮ<br>' +
                    'жӯЈзўәжҜ”дҫӢ ' + pct + '%гҖӮйҢҜиӘӨеҰӮдёӢпјҡ<br><br>' +
                    errorHtml +
                    '<br>еҠ жІ№е–” жңғдёҖзӣҙйҖІжӯҘзҡ„<br>' +
                    '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">' +
                    '<button id="download-log-btn" onclick="downloadLog()">дёӢијүжү№ж”№иЁҳйҢ„</button>' +
                    '<button id="create-err-bank-btn" onclick="createErrorBank()">д»ҘйҢҜйЎҢеүөе»әйЎҢеә«</button>' +
                    '</div>';

                generateLog(errors, total, correctCount, pct);
            }

            localStorage.removeItem('eng_quiz_progress2');
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('finish-btn').disabled = true;
            document.getElementById('fab-finish').style.display = 'none';
            quizGraded  = true;
            quizStarted = false;  // жү№ж”№еҫҢзӯүеҫ…дҪҝз”ЁиҖ…йҮҚж–°й»һйҒёйЎҢеә«
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // в”Җв”Җ Log з”ўз”ҹиҲҮдёӢијү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function generateLog(errors, total, correctCount, pct) {
            const now   = new Date();
            const year  = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day   = String(now.getDate()).padStart(2, '0');
            const hours = now.getHours();
            const mins  = String(now.getMinutes()).padStart(2, '0');
            const secs  = String(now.getSeconds()).padStart(2, '0');
            const ampm  = hours >= 12 ? 'PM' : 'AM';
            const hh    = String(hours).padStart(2, '0');

            const bankName = getActiveBank().name;
            lastLogFilename =
                year + month + day + '_' + ampm + hh + mins + secs + '_' +
                bankName + '_' + total + 'йЎҢ_жӯЈзўә' + correctCount + 'йЎҢ_йҢҜиӘӨ' + errors.length + 'йЎҢ.txt';

            const header = 'йЎҢеә«пјҡ' + bankName + '\r\n' +
                           'зёҪе…ұ ' + total + ' йЎҢпјҢжӯЈзўә ' + correctCount + ' йЎҢпјҢйҢҜиӘӨ ' + errors.length + ' йЎҢгҖӮ\r\n' +
                           'жӯЈзўәжҜ”дҫӢ ' + pct + '%гҖӮйҢҜиӘӨеҰӮдёӢпјҡ\r\n';
            const lines  = errors.map(function(e) {
                return e.no + ' ' + e.word + ' ' + e.pos + ' ' + e.zh + '\tијёе…Ҙ ' + e.userWord + ' зӮәйҢҜиӘӨзӯ”жЎҲ';
            });
            const footer = '\r\nеҠ жІ№е–” жңғдёҖзӣҙйҖІжӯҘзҡ„';
            lastLogContent = header + lines.join('\r\n') + footer;
            downloadLog();
        }

        function downloadLog() {
            const blob = new Blob(['\ufeff' + lastLogContent], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url; a.download = lastLogFilename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function formatClock(date) {
            return String(date.getHours()).padStart(2, '0') + ':' +
                   String(date.getMinutes()).padStart(2, '0') + ':' +
                   String(date.getSeconds()).padStart(2, '0');
        }

        function createErrorBank() {
            if (!lastErrors || lastErrors.length === 0) return;
            var errData = lastErrors.map(function(e) {
                return { no: e.no, word: e.word, pos: e.pos, zh: e.zh };
            });
            var errName = bankBaseName(getActiveBank().name) + '_' + todayStr() + '_' + errData.length;
            var errId   = genId();
            banks[errId] = { name: errName, data: errData };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            var btn = document.getElementById('create-err-bank-btn');
            if (btn) { btn.textContent = 'е·Іе»әз«Ӣ вң“'; btn.disabled = true; }
        }

        // в”Җв”Җ йӮ„еҺҹй җиЁӯйЎҢеә« в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function resetToDefaultBanks() {
            if (!confirm('зўәе®ҡиҰҒйӮ„еҺҹй җиЁӯйЎҢеә«пјҹ\n\nйҖҷе°Үжё…йҷӨжүҖжңүиҮӘиЁӮйЎҢеә«иҲҮдҪңзӯ”иЁҳйҢ„пјҢд»Ҙе…§е»әзҡ„ V2000 е’Ң TOEIC йҮҚж–°й–Ӣе§ӢгҖӮ\nжӯӨж“ҚдҪңз„Ўжі•йӮ„еҺҹгҖӮ')) return;
            localStorage.removeItem('quiz_banks');
            localStorage.removeItem('quiz_active_bank');
            localStorage.removeItem('eng_quiz_progress2');
            banks = {};
            var v2000Data = parsePipeData(V2000_PIPE);
            var toeicData = parsePipeData(TOEIC_PIPE);
            var id1 = genId(); banks[id1] = { name: 'V2000_' + v2000Data.length, data: v2000Data };
            var id2 = genId(); banks[id2] = { name: 'TOEIC_' + toeicData.length, data: toeicData };
            var id3 = genId(); banks[id3] = { name: 'Easy', data: [
                { no: 1, word: 'easy', pos: 'a.', zh: 'з°Ўе–®зҡ„' },
                { no: 2, word: 'good', pos: 'a.', zh: 'еҘҪзҡ„' }
            ]};
            saveBanks();
            activeBankId = id1;
            editorBankId = id1;
            localStorage.setItem('quiz_active_bank', id1);
            quizData    = [];
            quizGraded  = false;
            quizStarted = false;
            document.getElementById('stats-container').style.display = 'none';
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('finish-btn').disabled = false;
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('unlock-editor-btn').style.display = 'block';
            renderBankTabs('bank-tabs-main');
            showBankSelectHint();
            alert('е·ІйӮ„еҺҹзӮәе…§е»әй җиЁӯйЎҢеә«пјҲV2000гҖҒTOEICпјүгҖӮ');
        }

        // в”Җв”Җ еҗҲдҪөйЎҢеә« в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function mergeBanks() {
            var ids = Object.keys(banks).filter(function(id) { return id !== editorBankId; });
            if (ids.length === 0) return alert('жІ’жңүе…¶д»–йЎҢеә«еҸҜд»ҘеҗҲдҪөгҖӮ');
            var list = ids.map(function(id, i) {
                return (i + 1) + '. ' + banks[id].name + ' (' + banks[id].data.length + ' йЎҢ)';
            }).join('\n');
            var choice = prompt('йҒёж“ҮиҰҒеҗҲдҪөеҲ°гҖҢ' + banks[editorBankId].name + 'гҖҚзҡ„йЎҢеә«пјҡ\n\n' + list + '\n\nи«Ӣијёе…Ҙз·Ёиҷҹпјҡ');
            if (!choice) return;
            var idx = parseInt(choice) - 1;
            if (isNaN(idx) || idx < 0 || idx >= ids.length) return alert('з„Ўж•Ҳзҡ„йҒёж“ҮгҖӮ');
            var sourceId = ids[idx];
            if (!confirm('зўәе®ҡиҰҒе°ҮгҖҢ' + banks[sourceId].name + 'гҖҚзҡ„ ' + banks[sourceId].data.length + ' йЎҢеҗҲдҪөеҲ°гҖҢ' + banks[editorBankId].name + 'гҖҚпјҹ')) return;
            banks[editorBankId].data = banks[editorBankId].data.concat(banks[sourceId].data);
            saveBanks();
            syncEditorContent();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('е·ІеҗҲдҪө ' + banks[sourceId].data.length + ' йЎҢпјҢзӣ®еүҚе…ұ ' + banks[editorBankId].data.length + ' йЎҢгҖӮ');
        }

        // в”Җв”Җ дёӢијүйЎҢеә«ж–Үеӯ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        function downloadBank() {
            var bank = banks[editorBankId];
            var text = bank.data.map(function(i) {
                return i.no + ' ' + i.word + ' ' + i.pos + ' ' + i.zh;
            }).join('\r\n');
            var blob = new Blob(['\ufeff' + text], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = bank.name + '.txt';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function selectAllBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
        }

        function copyBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(ta.value);
            } else {
                document.execCommand('copy');
            }
        }

        function toggleAnswer(idx) {
            const info = document.getElementById('ans-info-' + idx);
            info.style.display = info.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
