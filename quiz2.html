<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字測驗系統</title>
    <style>
        body {
            background: linear-gradient(160deg, #1e2d3d 0%, #2c3e50 55%, #34495e 100%);
            min-height: 100vh;
            color: #333;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ecf0f1;
            margin-bottom: 16px;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.45);
        }

        /* ── 題庫 tabs (主畫面) ── */
        .bank-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .bank-tab {
            padding: 7px 18px;
            border: 2px solid #ecf0f1;
            background: transparent;
            color: #ecf0f1;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .bank-tab:hover  { background: rgba(255,255,255,0.15); }
        .bank-tab.active { background: #ecf0f1; color: #2c3e50; font-weight: bold; }

        /* ── 統計 & 題目區 ── */
        #stats-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #quiz-container { width: 100%; max-width: 600px; }

        .quiz-card {
            background-color: #ecf0f1;
            padding: 22px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 4px solid transparent;
            box-shadow: 0 4px 14px rgba(0,0,0,0.13);
            transition: box-shadow 0.25s, transform 0.25s;
        }

        .quiz-card:focus-within {
            box-shadow: 0 10px 32px rgba(0,0,0,0.22), 0 0 0 3px rgba(52,152,219,0.32);
            transform: translateY(-3px);
        }

        .quiz-card.correct { border-color: #27ae60; }
        .quiz-card.wrong   { border-color: #e74c3c; }

        .question-header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 4px solid #3498db;
            color: #2c3e50;
        }
        .original-no { font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px; }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52,152,219,0.18), 0 2px 8px rgba(0,0,0,0.07);
            background-color: #eaf4fd;
        }

        /* ── 按鈕在尾端，不懸浮 ── */
        .btn-group {
            margin: 8px 0 20px 0;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        #finish-btn        { background-color: #95a5a6; color: white; }
        #grade-btn         { background-color: #2ecc71; color: white; }
        #unlock-editor-btn { background-color: #8e44ad; color: white; margin-top: 20px; }

        .btn-group button { box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

        .btn-group button:hover:not(:disabled) {
            filter: brightness(1.08);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        }

        .btn-group button:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        button:hover    { filter: brightness(1.08); }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; filter: none; }

        .answer-info {
            margin-top: 15px; padding: 10px;
            background-color: #fce4ec; border-radius: 5px;
            display: none; border-left: 5px solid #e91e63;
        }
        .show-ans-btn {
            background-color: #e67e22; color: white;
            padding: 6px 12px; font-size: 13px;
            margin-top: 10px; display: none;
        }

        .error-line { display: flex; gap: 16px; font-family: "Courier New", monospace; font-size: 0.92em; padding: 2px 0; }
        .error-line .err-ans   { min-width: 180px; }
        .error-line .err-input { color: #c0392b; }

        #download-log-btn {
            background-color: #3498db; color: white;
            padding: 8px 18px; font-size: 14px; margin-top: 12px;
        }
        #create-err-bank-btn {
            background-color: #e67e22; color: white;
            padding: 8px 18px; font-size: 14px; margin-top: 12px;
        }
        .quiz-timer-summary {
            font-size: 0.88em; color: #7f8c8d;
            background: #f4f6f8; border-radius: 6px;
            padding: 8px 12px; margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        /* ── 編輯區 ── */
        #editor-section {
            width: 100%; max-width: 600px;
            background-color: #34495e;
            padding: 25px; border-radius: 10px;
            margin: 20px 0 60px 0;
            color: #ecf0f1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
        }

        /* 編輯區題庫 tabs */
        .editor-bank-bar {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
        }
        .editor-bank-tab {
            padding: 6px 14px;
            border: 2px solid #7f8c8d;
            background: transparent; color: #bdc3c7;
            border-radius: 16px; cursor: pointer;
            font-size: 13px; font-family: inherit;
            transition: all 0.2s;
        }
        .editor-bank-tab:hover { border-color: #ecf0f1; color: #ecf0f1; }
        .editor-bank-tab.active { border-color: #3498db; background: #3498db; color: white; font-weight: bold; }

        .bank-manage-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 14px; flex-wrap: wrap;
        }
        .bank-manage-row input[type="text"] {
            flex: 1; min-width: 120px; margin-bottom: 0;
            padding: 8px 10px; font-size: 14px;
        }
        .sm-btn         { padding: 8px 14px; font-size: 13px; border-radius: 4px; color: white; border: none; cursor: pointer; font-family: inherit; }
        .btn-rename     { background-color: #3498db; }
        .btn-add        { background-color: #27ae60; }
        .btn-delete     { background-color: #e74c3c; }

        #update-btn        { background-color: #e67e22; color: white; flex: 1; font-weight: bold; }
        #cancel-update-btn { background-color: #7f8c8d; color: white; }

        /* ── 懸浮完成鈕 ── */
        #fab-finish {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: #27ae60;
            color: white;
            border-radius: 50px;
            padding: 11px 18px;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: none;
        }
        #fab-finish:hover {
            background-color: #219a52;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        @keyframes grade-pulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 0 8px rgba(46,204,113,0.35), 0 3px 10px rgba(0,0,0,0.2); }
        }
        #grade-btn.ready { animation: grade-pulse 0.9s ease-in-out 3; }

        .empty-hint {
            color: #95a5a6; text-align: center;
            padding: 40px 20px; font-size: 1.1em;
        }

        /* ── 出題數選擇器 ── */
        .count-selector-card {
            background: #fff;
            border-radius: 14px;
            padding: 32px 28px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        .count-title    { font-size: 1.25em; color: #2c3e50; margin-bottom: 6px; }
        .count-subtitle { font-size: 0.95em; color: #7f8c8d; margin-bottom: 24px; }
        .count-options {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 28px;
        }
        .count-option-btn {
            padding: 13px 28px;
            border: 2px solid #dde4ea;
            background: transparent; color: #7f8c8d;
            border-radius: 10px; font-size: 1.15em; font-weight: bold;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .count-option-btn:hover  { border-color: #3498db; color: #3498db; }
        .count-option-btn.active {
            border-color: #3498db; background: #3498db; color: white;
            box-shadow: 0 3px 10px rgba(52,152,219,0.35);
        }
        .count-btn-row { display: flex; gap: 10px; }
        .count-start-btn {
            flex: 1; background-color: #2ecc71; color: white;
            padding: 13px 0; font-size: 16px; font-weight: bold; border-radius: 8px;
        }

        /* ── APP 內建瀏覽器警告橫幅 ── */
        #iab-banner {
            width: 100%;
            background: #e67e22;
            color: white;
            padding: 14px 16px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
        }
        .iab-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .iab-url-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            align-items: center; margin-top: 8px;
        }
        #iab-url-input {
            flex: 1; min-width: 0; padding: 6px 8px;
            font-size: 13px; border: none; border-radius: 4px;
            color: #2c3e50; margin-bottom: 0;
        }
        .iab-copy-btn {
            background: white; color: #e67e22; font-weight: bold;
            border: none; border-radius: 4px; padding: 6px 14px;
            font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .iab-dismiss-btn {
            display: block; margin-top: 8px; margin-left: auto;
            background: rgba(0,0,0,0.18); color: white;
            border: none; border-radius: 4px; padding: 4px 14px;
            font-size: 12px; cursor: pointer;
        }

        /* ── 歷史批改結果 ── */
        #history-section {
            width: 100%; max-width: 600px;
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0 40px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #history-section h3 { margin: 0 0 14px 0; color: #2c3e50; font-size: 1.1em; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
        .history-table th {
            background: #2c3e50; color: #ecf0f1;
            padding: 8px 6px; text-align: center;
        }
        .history-table td {
            padding: 7px 6px; border-bottom: 1px solid #ecf0f1;
            text-align: center; vertical-align: middle;
        }
        .history-table tr:not(.history-detail-row):hover td { background: #f4f6f8; }
        .history-detail-row td {
            background: #f8f9fa; text-align: left; padding: 8px 12px;
        }
        .history-detail-row textarea {
            width: 100%; box-sizing: border-box;
            font-size: 0.82em; background: #f8f9fa; color: #555;
            border: 1px solid #dde4ea; border-radius: 4px; resize: vertical;
            margin-bottom: 0; padding: 8px;
        }
        .history-empty { text-align: center; color: #95a5a6; padding: 20px 0; }
    </style>
</head>
<body>

    <!-- LINE 內建瀏覽器：盡早觸發 openExternalBrowser 跳轉，在頁面渲染前執行 -->
    <script>
        (function () {
            if (/Line\//i.test(navigator.userAgent) &&
                location.href.indexOf('openExternalBrowser') === -1) {
                var sep = location.href.indexOf('?') >= 0 ? '&' : '?';
                location.replace(location.href + sep + 'openExternalBrowser=1');
            }
        })();
    </script>

    <!-- APP 內建瀏覽器警告橫幅（JS 偵測後填入） -->
    <div id="iab-banner" style="display:none;"></div>

    <button id="fab-finish" onclick="fabFinish()">完成 ✓</button>

    <h1>英文單字測驗</h1>

    <!-- 題庫快速切換（主畫面） -->
    <div id="bank-tabs-main" class="bank-bar"></div>

    <div id="stats-container"></div>
    <div id="quiz-container"></div>

    <!-- 完成/批改按鈕置於尾端，不懸浮 -->
    <div class="btn-group">
        <button id="finish-btn" onclick="finishQuiz()">完成測驗</button>
        <button id="grade-btn" onclick="gradeQuiz()" disabled>批改</button>
    </div>

    <button id="unlock-editor-btn" onclick="unlockEditor()">管理員更新題目</button>

    <!-- 歷史批改結果 -->
    <div id="history-section" style="display:none;"></div>

    <!-- 編輯區 -->
    <div id="editor-section">
        <h3 style="margin-top:0">題目編輯區 (已解鎖)</h3>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <button class="sm-btn btn-add" onclick="addBank()">＋ 新增題庫</button>
            <span style="font-size:0.85em;color:#bdc3c7;">切換題庫：</span>
        </div>
        <div id="bank-tabs-editor" class="editor-bank-bar"></div>

        <div class="bank-manage-row">
            <input type="text" id="bank-name-input" placeholder="題庫名稱">
            <button class="sm-btn btn-rename" onclick="renameBank()">重新命名</button>
        </div>

        <textarea id="raw-input" rows="12" placeholder="1 abroad adv. 國外&#10;2 angel n. 天使&#10;3 as prep. 作為&#10;4 blame n. 責備&#10;..."></textarea>
        <div style="display:flex;gap:8px;margin-top:6px;">
            <button class="sm-btn" style="background:#7f8c8d;" onclick="selectAllBankText()">全選</button>
            <button class="sm-btn" style="background:#7f8c8d;" onclick="copyBankText()">全選並複製至剪貼簿</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;">
            <button id="update-btn" onclick="updateVocabulary()">確認更新</button>
            <button id="cancel-update-btn" onclick="cancelUpdate()">取消更新</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="sm-btn" style="background:#3498db;" onclick="mergeBanks()">合併其他題庫到此</button>
            <button class="sm-btn" style="background:#16a085;" onclick="downloadBank()">下載題庫文字</button>
        </div>
        <div style="margin-top:16px;border-top:1px solid #4a6278;padding-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <button class="sm-btn btn-delete" onclick="deleteBank()">刪除此題庫</button>
            <button class="sm-btn" style="background:#c0392b;" onclick="resetToDefaultBanks()">還原預設題庫</button>
            <span style="font-size:0.8em;color:#95a5a6;">還原將清除所有題庫</span>
        </div>
    </div>

    <script>

        const TOEIC_PIPE = "agenda n. 議程、待辦事項|authorize v. 授權、批准|benchmark n. 基準、標竿|comply v. 遵守、依從|consolidate v. 合併、鞏固|delegate v. 委派、授權|discrepancy n. 差異、不符|elaborate v./adj. 詳細說明；精心製作的|facilitate v. 促進、使便利|implement v. 實施、執行|initiative n. 主動性、計畫|inventory n. 庫存、存貨清單|leverage v./n. 善用；槓桿|mandatory adj. 強制的、必須的|merchandise n. 商品、貨物|notify v. 通知、告知|objective n. 目標、目的|compensate v. 補償、賠償|deficit n. 赤字、不足額|depreciate v. 折舊、貶值|dividend n. 股息、紅利|expenditure n. 支出、花費|fluctuate v. 波動、起伏|liability n. 負債、責任|lucrative adj. 有利可圖的|mortgage n. 抵押貸款|profitability n. 獲利能力|reimburse v. 報銷、退款|revenue n. 營收、收入|appraisal n. 評估、考核|eligible adj. 符合資格的|incentive n. 激勵、誘因|probation n. 試用期|recruit v. 招募、徵才|resignation n. 辭職、辭呈|retain v. 留住、保留|turnover n. 人員流動率；營業額|vacancy n. 空缺、職位空缺|affiliate n./v. 附屬機構；使隸屬|clientele n. 顧客群|compelling adj. 引人注目的、有說服力的|demographic n. 人口統計資料|endorse v. 背書、認可|exclusive adj. 獨家的、專屬的|niche n. 利基市場|prospect n. 潛在客戶、前景|consignment n. 託運、寄售|courier n. 快遞員、快遞公司|customs n. 海關|defective adj. 有缺陷的|dispatch v./n. 派遣；發貨|freight n. 貨運、運費|procurement n. 採購|recipient n. 收件人、接受者|shipment n. 貨物、運送|bandwidth n. 頻寬|configure v. 設定、配置|accommodate v. 容納、提供住宿|adjoining adj. 相鄰的|amenity n. 便利設施|complimentary adj. 免費的、贈送的|confirmation n. 確認、確認書|itinerary n. 行程表|layover n. 中途停留|transit n. 過境、轉運|adjourn v. 休會、延期|clarify v. 澄清、說明|consensus n. 共識|correspond v. 通信、符合|outline v./n. 概述；大綱|proceed v. 進行、繼續|reiterate v. 重申、再次強調|unanimous adj. 一致通過的|clause n. 條款|liability n. 法律責任|penalty n. 罰款、處罰|terminate v. 終止、結束|valid adj. 有效的|violation n. 違規、違反";

        // ── 拆分題庫的題數選項（未來可在此調整）──────────────────────────
        const SPLIT_OPTIONS = [50, 100];

        function parsePipeData(pipe) {
            return pipe.split('|').map(function(s, i) {
                var p = s.trim().split(/\s+/);
                if (p.length < 2) return null;
                var wr = parseWordRest(p.slice(1).join(' '));
                return { no: i + 1, word: p[0], pos: wr.pos, zh: wr.zh };
            }).filter(Boolean);
        }

        // 解析詞性+中文部分，支援多詞性格式（n.刷子; v.刷）和傳統格式（adv. 國外）
        function parseWordRest(rest) {
            rest = rest.trim();
            var posRe = /^[a-z]+\./;
            if (!posRe.test(rest)) {
                // 不以詞性開頭，視第一個 token 為詞性，其餘為中文
                var p = rest.split(/\s+/);
                return { pos: p[0] || '', zh: p.slice(1).join(' ') };
            }
            // 以 "; " 切割多詞性段落，每段格式為 "pos.zh" 或 "pos. zh"
            var parts = rest.split(/;\s*/);
            var posList = [], zhList = [];
            parts.forEach(function(part) {
                part = part.trim();
                if (!part) return;
                var m = part.match(/^([a-z]+\.)\s*(.*)/);
                if (m) { posList.push(m[1]); if (m[2]) zhList.push(m[2]); }
                else   { zhList.push(part); }
            });
            return { pos: posList.join('; '), zh: zhList.join('; ') };
        }

        // 將 entry 序列化回文字（多詞性輸出緊湊格式 n.刷子; v.刷）
        function serializeEntry(item) {
            if (item.pos && item.pos.indexOf(';') >= 0) {
                var posParts = item.pos.split(/;\s*/);
                var zhParts  = item.zh.split(/;\s*/);
                var combined = posParts.map(function(p, i) {
                    return p + (zhParts[i] || '');
                }).join('; ');
                return item.no + ' ' + item.word + ' ' + combined;
            }
            return item.no + ' ' + item.word + ' ' + item.pos + ' ' + item.zh;
        }

        let banks        = {};
        let activeBankId = '';
        let editorBankId = '';   // 編輯區正在編輯的題庫，不一定等於 activeBankId
        let quizData     = [];
        let quizGraded   = false;
        let quizStarted  = false;  // 是否已明確選擇題庫並開始測驗
        let currentCountStops    = [];  // 出題數選擇器目前的 stops 陣列
        let currentSelectedCount = 0;   // 選擇器目前選中的題數
        let quizStartTime        = null; // 開始考試時間
        let lastErrors           = [];   // 最近一次批改的錯題（供手動建立題庫）
        let lastLogContent  = '';
        let lastLogFilename = '';

        // ── 防止關閉分頁遺失填答 ─────────────────────────────────────────
        window.addEventListener('beforeunload', function(e) {
            if (quizGraded) return;
            const hasInput = quizData.some(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return el && el.value.length > 0;
            });
            if (hasInput) { e.preventDefault(); e.returnValue = ''; }
        });

        // ── 初始化 ──────────────────────────────────────────────────────
        window.onload = function() {
            checkInAppBrowser();
            initBanks();
            renderBankTabs('bank-tabs-main');
            renderHistory();

            // Enter 鍵切換下一題輸入
            document.getElementById('quiz-container').addEventListener('keydown', function(e) {
                if (e.key !== 'Enter' || !e.target.matches('input[type="text"]')) return;
                e.preventDefault();
                var idx  = parseInt(e.target.id.replace('input-', ''), 10);
                var next = document.getElementById('input-' + (idx + 1));
                if (next) { next.focus(); next.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            });

            const savedProgress = localStorage.getItem('eng_quiz_progress2');
            if (savedProgress) {
                const parsed = JSON.parse(savedProgress);
                if (parsed.bankId === activeBankId) {
                    quizData = parsed.quizData;
                    quizStarted = true;
                    renderQuiz();
                    parsed.answers.forEach(function(ans, idx) {
                        const el = document.getElementById('input-' + idx);
                        if (el) el.value = ans.wordValue;
                    });
                    return;
                }
            }
            // 無進度記錄：等待使用者點選題庫後再開始
            showBankSelectHint();
        };

        function showBankSelectHint() {
            document.getElementById('quiz-container').innerHTML =
                '<div class="empty-hint">請點選上方題庫標籤以開始測驗。</div>';
            document.getElementById('stats-container').style.display = 'none';
            document.getElementById('fab-finish').style.display = 'none';
            updateHistoryVisibility();
        }

        // ── 題庫管理 ────────────────────────────────────────────────────
        function genId() {
            return 'bank_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        }

        function initBanks() {
            const saved = localStorage.getItem('quiz_banks');
            banks = saved ? JSON.parse(saved) : {};
            if (Object.keys(banks).length === 0) {
                var v2000Data = parsePipeData(V2000_PIPE);
                var toeicData = parsePipeData(TOEIC_PIPE);
                var id1 = genId(); banks[id1] = { name: 'V2000_' + v2000Data.length, data: v2000Data };
                var id2 = genId(); banks[id2] = { name: 'TOEIC_' + toeicData.length, data: toeicData };
                var id3 = genId(); banks[id3] = { name: 'Easy', data: [
                    { no: 1, word: 'easy', pos: 'a.', zh: '簡單的' },
                    { no: 2, word: 'good', pos: 'a.', zh: '好的' }
                ]};
                saveBanks();
            }
            const savedActive = localStorage.getItem('quiz_active_bank');
            activeBankId = (savedActive && banks[savedActive]) ? savedActive : Object.keys(banks)[0];
            localStorage.setItem('quiz_active_bank', activeBankId);
        }

        function saveBanks() {
            localStorage.setItem('quiz_banks', JSON.stringify(banks));
        }

        function getActiveBank() { return banks[activeBankId]; }

        function renderBankTabs(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const isEditor = (containerId === 'bank-tabs-editor');
            const highlightId = isEditor ? editorBankId : activeBankId;
            container.innerHTML = '';
            Object.keys(banks).forEach(function(id) {
                const tab = document.createElement('button');
                tab.className = (isEditor ? 'editor-bank-tab' : 'bank-tab') +
                                (id === highlightId ? ' active' : '');
                tab.textContent = banks[id].name;
                // 主畫面 tab → 切換作答題庫；編輯區 tab → 僅切換編輯目標，不影響測驗
                tab.onclick = isEditor
                    ? function() { setEditorBank(id); }
                    : function() { switchBank(id); };
                container.appendChild(tab);
            });
        }

        function setEditorBank(id) {
            editorBankId = id;
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
        }

        function switchBank(id) {
            if (id === activeBankId) {
                // 若還未開始測驗（無進度、剛載入或剛批改完），點選當前題庫也啟動
                if (!quizStarted) startNewQuiz();
                return;
            }

            const hasInput = !quizGraded && quizData.some(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return el && el.value.trim();
            });
            if (hasInput && !confirm('切換題庫將清除目前的作答進度，確定要切換嗎？')) return;

            activeBankId = id;
            editorBankId = id;   // 主畫面切換時，編輯目標跟著對齊
            localStorage.setItem('quiz_active_bank', id);
            localStorage.removeItem('eng_quiz_progress2');

            document.getElementById('stats-container').style.display = 'none';
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('finish-btn').disabled = false;

            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
            startNewQuiz();

            // 若編輯區已開啟，切換後題目卡增減會讓頁面位移，重新 scroll 回編輯區
            const editorSection = document.getElementById('editor-section');
            if (editorSection.style.display !== 'none') {
                setTimeout(function() {
                    editorSection.scrollIntoView({ behavior: 'smooth' });
                }, 50);
            }
        }

        function addBank() {
            const name = prompt('新題庫名稱：');
            if (!name || !name.trim()) return;
            const id = genId();
            banks[id] = { name: name.trim(), data: [] };
            saveBanks();
            // 僅切換編輯目標，不影響目前的測驗畫面
            editorBankId = id;
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
        }

        function renameBank() {
            const name = document.getElementById('bank-name-input').value.trim();
            if (!name) return alert('請輸入題庫名稱');
            banks[editorBankId].name = name;
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
        }

        function deleteBank() {
            if (Object.keys(banks).length <= 1) return alert('至少保留一個題庫，無法刪除。');
            if (!confirm('確定要刪除「' + banks[editorBankId].name + '」？此操作無法還原。')) return;
            const wasActive = (editorBankId === activeBankId);
            delete banks[editorBankId];
            saveBanks();
            editorBankId = Object.keys(banks)[0];
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
            // 只有刪掉的是作答題庫時才重啟測驗
            if (wasActive) {
                activeBankId = editorBankId;
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                document.getElementById('finish-btn').disabled = false;
                startNewQuiz();
            }
        }

        // 同步編輯區的 textarea 與題庫名稱欄
        function syncEditorContent() {
            const bank = banks[editorBankId];
            document.getElementById('bank-name-input').value = bank.name;
            document.getElementById('raw-input').value =
                bank.data.map(serializeEntry).join('\n');
        }

        // ── 解鎖編輯區 ──────────────────────────────────────────────────
        function cancelUpdate() {
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('unlock-editor-btn').style.display = 'block';
            updateHistoryVisibility();
        }

        function unlockEditor() {
            const pw = prompt("請輸入管理密碼以編輯題目：");
            if (pw === "edit") {
                editorBankId = activeBankId;   // 預設編輯目前作答的題庫
                renderBankTabs('bank-tabs-editor');
                syncEditorContent();
                document.getElementById('editor-section').style.display = 'block';
                document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
                document.getElementById('unlock-editor-btn').style.display = 'none';
                updateHistoryVisibility();
            } else if (pw !== null) {
                alert("密碼錯誤，無法開啟編輯區。");
            }
        }

        function updateVocabulary() {
            const text = document.getElementById('raw-input').value.trim();
            if (!text) return alert("請輸入題目內容！");
            const newData = [];
            try {
                text.split('\n').forEach(function(line) {
                    // 清除批改標注：截掉 tab 後的內容，再移除「輸入 X 為錯誤答案」
                    const cleaned = line.split('\t')[0]
                        .replace(/\s*輸入\s+\S+\s+為錯誤答案.*$/, '').trim();
                    const p = cleaned.split(/\s+/);
                    if (p.length >= 3) {
                        const wr = parseWordRest(p.slice(2).join(' '));
                        newData.push({ no: p[0], word: p[1], pos: wr.pos, zh: wr.zh });
                    }
                });
                if (newData.length === 0) throw new Error();
                banks[editorBankId].data = newData;
                saveBanks();
                activeBankId = editorBankId;   // 確認更新後，切換作答題庫為剛儲存的題庫
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                document.getElementById('finish-btn').disabled = false;
                document.getElementById('editor-section').style.display = 'none';
                document.getElementById('unlock-editor-btn').style.display = 'block';
                renderBankTabs('bank-tabs-main');
                startNewQuiz();
                alert("已載入 " + newData.length + " 題，測驗已重置。");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                alert("解析失敗！格式範例：1 word n. 單字");
            }
        }

        // ── 工具函式 ────────────────────────────────────────────────────
        function todayStr() {
            var d = new Date();
            return d.getFullYear() +
                String(d.getMonth() + 1).padStart(2, '0') +
                String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = s[i]; s[i] = s[j]; s[j] = t;
            }
            return s;
        }

        function startNewQuiz() {
            quizStarted = true;
            var data = getActiveBank().data;
            if (!data || data.length === 0) {
                quizData = [];
                document.getElementById('quiz-container').innerHTML =
                    '<div class="empty-hint">此題庫尚無題目，請在編輯區新增題目。</div>';
                document.getElementById('fab-finish').style.display = 'none';
                return;
            }
            if (data.length > SPLIT_OPTIONS[0]) {
                showCountSelector();
                return;
            }
            doStartQuiz(data.length);
        }

        // ── 出題數選擇器 ─────────────────────────────────────────────────
        /** 建立 stops 陣列：從 SPLIT_OPTIONS 取小於 total 的值，再加上 total */
        function buildCountStops(total) {
            var stops = [];
            SPLIT_OPTIONS.forEach(function(v) {
                if (v < total) stops.push(v);
            });
            stops.push(total);
            return stops;
        }

        function showCountSelector() {
            var bank  = getActiveBank();
            var total = bank.data.length;
            currentCountStops = buildCountStops(total);
            var defaultVal = currentCountStops.indexOf(50) !== -1 ? 50 : currentCountStops[Math.min(1, currentCountStops.length - 1)];
            currentSelectedCount = defaultVal;

            var optionBtns = currentCountStops.map(function(v) {
                return '<button class="count-option-btn' + (v === defaultVal ? ' active' : '') + '"' +
                       ' data-count="' + v + '" onclick="selectCount(' + v + ')">' + v + '</button>';
            }).join('');

            document.getElementById('quiz-container').innerHTML =
                '<div class="count-selector-card">' +
                  '<div class="count-title">「' + bank.name + '」共 <strong>' + total + '</strong> 題</div>' +
                  '<div class="count-subtitle">這次要考幾題？</div>' +
                  '<div class="count-options">' + optionBtns + '</div>' +
                  '<div class="count-btn-row">' +
                    '<button class="count-start-btn" onclick="confirmQuizStart()">開始考試</button>' +
                  '</div>' +
                '</div>';
            document.getElementById('fab-finish').style.display = 'none';
            updateHistoryVisibility();
        }

        function selectCount(n) {
            currentSelectedCount = n;
            document.querySelectorAll('.count-option-btn').forEach(function(btn) {
                btn.classList.toggle('active', parseInt(btn.dataset.count, 10) === n);
            });
        }

        function confirmQuizStart() {
            doStartQuiz(currentSelectedCount);
        }

        /** 取得題庫的「基底名稱」：去掉末尾的 _數字（題目數），保留其餘部分 */
        function bankBaseName(name) {
            return name.replace(/_\d+$/, '');
        }

        function doStartQuiz(n) {
            var bank    = getActiveBank();
            var allData = bank.data;
            var data    = allData.slice(0, n);

            // 若有剩餘題目：建立「本次 N 題」題庫 + 「剩餘」題庫，並切換作答題庫
            if (allData.length > n) {
                var baseName = bankBaseName(bank.name);
                var rest     = allData.slice(n);
                var selId    = genId();
                var remId    = genId();
                banks[selId] = { name: baseName + '_' + todayStr() + '_' + n,           data: data.slice() };
                banks[remId] = { name: baseName + '_' + todayStr() + '_' + rest.length, data: rest };
                saveBanks();
                activeBankId = selId;   // 作答題庫切換為本次選定的 N 題題庫
                localStorage.setItem('quiz_active_bank', activeBankId);
                renderBankTabs('bank-tabs-main');
                renderBankTabs('bank-tabs-editor');
            }

            quizData      = shuffleArray(data);
            quizGraded    = false;
            quizStartTime = new Date();
            renderQuiz();
            saveProgress();
        }

        // ── 渲染題目 ─────────────────────────────────────────────────────
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            quizData.forEach(function(item, idx) {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = 'q-' + idx;
                card.innerHTML =
                    '<div class="question-header">題目 ' + (idx + 1) + '. ' + item.zh + '（' + item.pos + '）</div>' +
                    '<div class="original-no">單字原始編號：' + item.no + '</div>' +
                    '<input type="text" id="input-' + idx + '" placeholder="輸入英文單字..." oninput="saveProgress()">' +
                    '<button id="show-ans-btn-' + idx + '" class="show-ans-btn" onclick="toggleAnswer(' + idx + ')">顯示答案</button>' +
                    '<div id="ans-info-' + idx + '" class="answer-info">正確答案：<strong>' + item.word + '</strong></div>';
                container.appendChild(card);
            });
            document.getElementById('fab-finish').style.display = 'block';
            updateHistoryVisibility();
        }

        function saveProgress() {
            const answers = quizData.map(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return { wordValue: el ? el.value : '' };
            });
            localStorage.setItem('eng_quiz_progress2', JSON.stringify({
                bankId: activeBankId, quizData: quizData, answers: answers
            }));
        }

        // ── 完成測驗 ─────────────────────────────────────────────────────
        function finishQuiz() {
            let firstEmpty = -1;
            const done = quizData.every(function(_, idx) {
                const w = document.getElementById('input-' + idx).value;
                if (w.length === 0 && firstEmpty === -1) firstEmpty = idx;
                return w.length > 0;
            });
            if (!done) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
            } else {
                document.getElementById('grade-btn').disabled = false;
            }
        }

        function fabFinish() {
            if (quizGraded || quizData.length === 0) return;
            let firstEmpty = -1;
            const done = quizData.every(function(_, idx) {
                const w = document.getElementById('input-' + idx).value;
                if (w.length === 0 && firstEmpty === -1) firstEmpty = idx;
                return w.length > 0;
            });
            if (!done) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
            } else {
                document.getElementById('grade-btn').disabled = false;
                document.querySelector('.btn-group').scrollIntoView({ behavior: 'smooth' });
                var gb = document.getElementById('grade-btn');
                gb.classList.remove('ready');
                void gb.offsetWidth;
                gb.classList.add('ready');
            }
        }

        // ── 批改 ─────────────────────────────────────────────────────────
        function gradeQuiz() {
            const total  = quizData.length;
            const errors = [];

            quizData.forEach(function(item, idx) {
                const inputWord = document.getElementById('input-' + idx).value.trim();
                const card      = document.getElementById('q-' + idx);
                const isMatch   = inputWord.toLowerCase() === item.word.toLowerCase();

                if (isMatch) {
                    card.classList.add('correct');
                } else {
                    card.classList.add('wrong');
                    document.getElementById('show-ans-btn-' + idx).style.display = 'block';
                    errors.push({ no: item.no, word: item.word, pos: item.pos, zh: item.zh, userWord: inputWord });
                }
            });

            const correctCount = total - errors.length;
            const pct          = Math.round(correctCount / total * 100);
            const statsPanel   = document.getElementById('stats-container');
            statsPanel.style.display = 'block';
            lastErrors = errors;

            // 計時
            var quizEndTime = new Date();
            var timerHtml   = '';
            if (quizStartTime) {
                var elapsed = quizEndTime - quizStartTime;
                var mins    = Math.floor(elapsed / 60000);
                var secs    = Math.floor((elapsed % 60000) / 1000);
                timerHtml =
                    '<div class="quiz-timer-summary">' +
                    '開始 ' + formatClock(quizStartTime) +
                    '　結束 ' + formatClock(quizEndTime) +
                    '　花費 ' + mins + ' 分 ' + secs + ' 秒' +
                    '</div>';
            }

            if (errors.length === 0) {
                statsPanel.innerHTML =
                    timerHtml +
                    '<div style="font-size:1.25em;text-align:center;padding:12px 0;line-height:2;">' +
                    '你很努力，全對了，你很棒</div>';
            } else {
                const errorHtml = errors.map(function(e) {
                    return '<div class="error-line">' +
                           '<span class="err-ans">' + e.no + ' ' + e.word + ' ' + e.pos + ' ' + e.zh + '</span>' +
                           '<span class="err-input">輸入 ' + e.userWord + ' 為錯誤答案</span>' +
                           '</div>';
                }).join('');

                statsPanel.innerHTML =
                    timerHtml +
                    '總共 ' + total + ' 題，正確 ' + correctCount + ' 題，錯誤 ' + errors.length + ' 題。<br>' +
                    '正確比例 ' + pct + '%。錯誤如下：<br><br>' +
                    errorHtml +
                    '<br>加油喔 會一直進步的<br>' +
                    '<textarea id="log-textarea" readonly rows="6" style="margin-top:10px;background:#f8f9fa;color:#555;font-size:0.85em;resize:vertical;"></textarea>' +
                    '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">' +
                    '<button onclick="selectLogText()">全選</button>' +
                    '<button onclick="copyLogText()">複製</button>' +
                    '<button id="download-log-btn" onclick="downloadLog()">下載批改記錄</button>' +
                    '<button id="create-err-bank-btn" onclick="createErrorBank()">以錯題創建題庫</button>' +
                    '</div>';

                generateLog(errors, total, correctCount, pct);
                document.getElementById('log-textarea').value = lastLogContent;
            }

            // 儲存歷史批改記錄
            var histLogText = errors.length === 0
                ? '題庫：' + getActiveBank().name + '\r\n總共 ' + total + ' 題，全部正確！\r\n正確率 100%。'
                : lastLogContent;
            appendHistoryRecord({
                bankName:  getActiveBank().name,
                startTime: quizStartTime ? quizStartTime.toISOString() : null,
                endTime:   quizEndTime.toISOString(),
                elapsedMs: quizStartTime ? (quizEndTime - quizStartTime) : 0,
                total:     total,
                correct:   correctCount,
                errors:    errors.length,
                logText:   histLogText
            });
            renderHistory();

            localStorage.removeItem('eng_quiz_progress2');
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('finish-btn').disabled = true;
            document.getElementById('fab-finish').style.display = 'none';
            quizGraded  = true;
            quizStarted = false;  // 批改後等待使用者重新點選題庫
            updateHistoryVisibility();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ── Log 產生與下載 ────────────────────────────────────────────────
        function generateLog(errors, total, correctCount, pct) {
            const now   = new Date();
            const year  = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day   = String(now.getDate()).padStart(2, '0');
            const hours = now.getHours();
            const mins  = String(now.getMinutes()).padStart(2, '0');
            const secs  = String(now.getSeconds()).padStart(2, '0');
            const ampm  = hours >= 12 ? 'PM' : 'AM';
            const hh    = String(hours).padStart(2, '0');

            const bankName = getActiveBank().name;
            lastLogFilename =
                year + month + day + '_' + ampm + hh + mins + secs + '_' +
                bankName + '_' + total + '題_正確' + correctCount + '題_錯誤' + errors.length + '題.txt';

            const header = '題庫：' + bankName + '\r\n' +
                           '總共 ' + total + ' 題，正確 ' + correctCount + ' 題，錯誤 ' + errors.length + ' 題。\r\n' +
                           '正確比例 ' + pct + '%。錯誤如下：\r\n';
            const lines  = errors.map(function(e) {
                return serializeEntry(e) + '\t輸入 ' + e.userWord + ' 為錯誤答案';
            });
            const footer = '\r\n加油喔 會一直進步的';
            lastLogContent = header + lines.join('\r\n') + footer;
        }

        function downloadLog() {
            const blob = new Blob(['\ufeff' + lastLogContent], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url; a.download = lastLogFilename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function formatClock(date) {
            return String(date.getHours()).padStart(2, '0') + ':' +
                   String(date.getMinutes()).padStart(2, '0') + ':' +
                   String(date.getSeconds()).padStart(2, '0');
        }

        function createErrorBank() {
            if (!lastErrors || lastErrors.length === 0) return;
            var errData = lastErrors.map(function(e) {
                return { no: e.no, word: e.word, pos: e.pos, zh: e.zh };
            });
            var errName = bankBaseName(getActiveBank().name) + '_' + todayStr() + '_' + errData.length;
            var errId   = genId();
            banks[errId] = { name: errName, data: errData };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            var btn = document.getElementById('create-err-bank-btn');
            if (btn) { btn.textContent = '已建立 ✓'; btn.disabled = true; }
        }

        // ── 還原預設題庫 ──────────────────────────────────────────────────
        function resetToDefaultBanks() {
            if (!confirm('確定要還原預設題庫？\n\n這將清除所有自訂題庫與作答記錄，以內建的 V2000 和 TOEIC 重新開始。\n此操作無法還原。')) return;
            localStorage.removeItem('quiz_banks');
            localStorage.removeItem('quiz_active_bank');
            localStorage.removeItem('eng_quiz_progress2');
            banks = {};
            var v2000Data = parsePipeData(V2000_PIPE);
            var toeicData = parsePipeData(TOEIC_PIPE);
            var id1 = genId(); banks[id1] = { name: 'V2000_' + v2000Data.length, data: v2000Data };
            var id2 = genId(); banks[id2] = { name: 'TOEIC_' + toeicData.length, data: toeicData };
            var id3 = genId(); banks[id3] = { name: 'Easy', data: [
                { no: 1, word: 'easy', pos: 'a.', zh: '簡單的' },
                { no: 2, word: 'good', pos: 'a.', zh: '好的' }
            ]};
            saveBanks();
            activeBankId = id1;
            editorBankId = id1;
            localStorage.setItem('quiz_active_bank', id1);
            quizData    = [];
            quizGraded  = false;
            quizStarted = false;
            document.getElementById('stats-container').style.display = 'none';
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('finish-btn').disabled = false;
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('unlock-editor-btn').style.display = 'block';
            renderBankTabs('bank-tabs-main');
            showBankSelectHint();
            alert('已還原為內建預設題庫（V2000、TOEIC）。');
        }

        // ── 合併題庫 ────────────────────────────────────────────────────
        function mergeBanks() {
            var ids = Object.keys(banks).filter(function(id) { return id !== editorBankId; });
            if (ids.length === 0) return alert('沒有其他題庫可以合併。');
            var list = ids.map(function(id, i) {
                return (i + 1) + '. ' + banks[id].name + ' (' + banks[id].data.length + ' 題)';
            }).join('\n');
            var choice = prompt('選擇要合併到「' + banks[editorBankId].name + '」的題庫：\n\n' + list + '\n\n請輸入編號：');
            if (!choice) return;
            var idx = parseInt(choice) - 1;
            if (isNaN(idx) || idx < 0 || idx >= ids.length) return alert('無效的選擇。');
            var sourceId = ids[idx];
            if (!confirm('確定要將「' + banks[sourceId].name + '」的 ' + banks[sourceId].data.length + ' 題合併到「' + banks[editorBankId].name + '」？')) return;
            banks[editorBankId].data = banks[editorBankId].data.concat(banks[sourceId].data);
            saveBanks();
            syncEditorContent();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('已合併 ' + banks[sourceId].data.length + ' 題，目前共 ' + banks[editorBankId].data.length + ' 題。');
        }

        // ── 下載題庫文字 ──────────────────────────────────────────────
        function downloadBank() {
            var bank = banks[editorBankId];
            var text = bank.data.map(serializeEntry).join('\r\n');
            var blob = new Blob(['\ufeff' + text], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = bank.name + '.txt';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function selectLogText() {
            var ta = document.getElementById('log-textarea');
            if (ta) { ta.focus(); ta.select(); }
        }

        function copyLogText() {
            var ta = document.getElementById('log-textarea');
            if (!ta) return;
            ta.focus(); ta.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(ta.value);
            } else {
                document.execCommand('copy');
            }
        }

        function selectAllBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
        }

        function copyBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(ta.value);
            } else {
                document.execCommand('copy');
            }
        }

        function toggleAnswer(idx) {
            const info = document.getElementById('ans-info-' + idx);
            info.style.display = info.style.display === 'block' ? 'none' : 'block';
        }

        // ── APP 內建瀏覽器偵測 ───────────────────────────────────────────
        function checkInAppBrowser() {
            var ua  = navigator.userAgent;
            var app = null;
            if (/FBAN|FBAV|FB_IAB|FBIOS/.test(ua))   app = 'Facebook';
            else if (/Line\//i.test(ua))               app = 'LINE';
            else if (/Instagram/.test(ua))             app = 'Instagram';
            else if (/MicroMessenger/.test(ua))        app = 'WeChat';
            if (!app) return;

            var isIOS = /iPhone|iPad|iPod/.test(ua);
            // 清除 openExternalBrowser 參數（供 copy 用）
            var cleanUrl = location.href
                .replace(/[?&]openExternalBrowser=1/, '')
                .replace(/\?$/, '');

            var steps = '';
            if (app === 'LINE') {
                steps = isIOS
                    ? '點右上角 <strong>⋯</strong> → 「在瀏覽器中開啟」<br>或複製下方網址，貼至 Safari 開啟。'
                    : '點右上角 <strong>⋯</strong> → 「以其他瀏覽器開啟」<br>或複製下方網址，貼至 Chrome 開啟。';
            } else if (app === 'Facebook') {
                steps = isIOS
                    ? '點右下角 <strong>⋯</strong> → 「在 Safari 中開啟」'
                    : '點右上角 <strong>⋯</strong> → 「在外部瀏覽器中開啟」';
            } else if (app === 'Instagram') {
                steps = isIOS
                    ? '點右下角 <strong>⋯</strong> → 「在 Safari 中開啟」'
                    : '點右下角 <strong>⋯</strong> → 「在瀏覽器中開啟」';
            } else {
                steps = '請複製下方網址，在 Safari 或 Chrome 中開啟。';
            }

            var banner = document.getElementById('iab-banner');
            banner.innerHTML =
                '<div class="iab-title">⚠ 偵測到 ' + app + ' 內建瀏覽器</div>' +
                '<div>此環境可能無法正常儲存測驗進度與歷史記錄，建議使用外部瀏覽器開啟。</div>' +
                '<div style="margin-top:6px;">' + steps + '</div>' +
                '<div class="iab-url-row">' +
                '<input id="iab-url-input" readonly value="' + cleanUrl + '">' +
                '<button class="iab-copy-btn" onclick="copyIABUrl()">複製網址</button>' +
                '</div>' +
                '<button class="iab-dismiss-btn" onclick="dismissIABBanner()">我知道了，繼續使用</button>';
            banner.style.display = 'block';
        }

        function copyIABUrl() {
            var input = document.getElementById('iab-url-input');
            if (!input) return;
            input.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(function () {
                    alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
                }).catch(function () {
                    document.execCommand('copy');
                    alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
                });
            } else {
                document.execCommand('copy');
                alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
            }
        }

        function dismissIABBanner() {
            document.getElementById('iab-banner').style.display = 'none';
        }

        // ── 歷史批改記錄 ─────────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function loadHistory() {
            var raw = localStorage.getItem('quiz_grade_history');
            return raw ? JSON.parse(raw) : [];
        }

        function saveHistoryData(records) {
            localStorage.setItem('quiz_grade_history', JSON.stringify(records));
        }

        function appendHistoryRecord(record) {
            var records = loadHistory();
            var nextSeq = records.length > 0 ? records[0].seq + 1 : 1;
            record.seq = nextSeq;
            records.unshift(record);
            if (records.length > 100) records = records.slice(0, 100);
            saveHistoryData(records);
        }

        function formatHistoryTime(isoStr) {
            if (!isoStr) return '-';
            var d = new Date(isoStr);
            return d.getFullYear() + '/' +
                   String(d.getMonth() + 1).padStart(2, '0') + '/' +
                   String(d.getDate()).padStart(2, '0') + ' ' +
                   String(d.getHours()).padStart(2, '0') + ':' +
                   String(d.getMinutes()).padStart(2, '0');
        }

        function renderHistory() {
            var section = document.getElementById('history-section');
            if (!section) return;
            var records = loadHistory();
            if (records.length === 0) {
                section.innerHTML = '<h3>歷史批改結果</h3><div class="history-empty">尚無批改記錄。</div>';
                return;
            }
            var rows = records.map(function(r) {
                var pct     = r.total > 0 ? Math.round(r.correct / r.total * 100) : 0;
                var mins    = Math.floor(r.elapsedMs / 60000);
                var secs    = Math.floor((r.elapsedMs % 60000) / 1000);
                var elapsed = mins + '分' + String(secs).padStart(2, '0') + '秒';
                return '<tr>' +
                    '<td>' + r.seq + '</td>' +
                    '<td style="text-align:left">' + escapeHtml(r.bankName) + '</td>' +
                    '<td>' + formatHistoryTime(r.startTime) + '</td>' +
                    '<td>' + elapsed + '</td>' +
                    '<td style="color:#27ae60;font-weight:bold">' + r.correct + '</td>' +
                    '<td style="color:#e74c3c;font-weight:bold">' + r.errors + '</td>' +
                    '<td>' + pct + '%</td>' +
                    '<td><button class="sm-btn" style="background:#3498db;padding:4px 10px;font-size:12px;" ' +
                        'onclick="toggleHistoryDetail(' + r.seq + ')">細節</button></td>' +
                    '</tr>' +
                    '<tr id="hist-detail-' + r.seq + '" style="display:none;" class="history-detail-row">' +
                    '<td colspan="8"><textarea rows="6" readonly>' + escapeHtml(r.logText) + '</textarea></td>' +
                    '</tr>';
            }).join('');
            section.innerHTML =
                '<h3>歷史批改結果</h3>' +
                '<table class="history-table">' +
                '<thead><tr>' +
                '<th>#</th><th>題庫</th><th>考試時間</th><th>花費</th>' +
                '<th>正確</th><th>錯誤</th><th>正確率</th><th>細節</th>' +
                '</tr></thead>' +
                '<tbody>' + rows + '</tbody>' +
                '</table>';
        }

        function toggleHistoryDetail(seq) {
            var row = document.getElementById('hist-detail-' + seq);
            if (row) row.style.display = row.style.display === 'none' ? 'table-row' : 'none';
        }

        function isEditorOpen() {
            return document.getElementById('editor-section').style.display !== 'none';
        }

        function updateHistoryVisibility() {
            var show = !quizStarted && !isEditorOpen();
            document.getElementById('history-section').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
