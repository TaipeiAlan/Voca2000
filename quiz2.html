            if (el) el.classList.toggle('open');
        }

        function archiveSelectAll(idx) {
            var el = document.getElementById('archive-vocab-' + idx);
            if (!el) return;
            var range = document.createRange();
            range.selectNodeContents(el);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        function archiveCopy(idx) {
            var entry = quizArchive[idx];
            if (!entry) return;
            var text = entry.data.map(function(item) {
                return item.no + ' ' + item.word + ' ' + (item.pos || '') + ' ' + (item.zh || '');
            }).join('\n');
            navigator.clipboard.writeText(text).catch(function() {
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        function archiveSaveAsBank(idx) {
            var entry = quizArchive[idx];
            if (!entry) return;
            var name = prompt('新題庫名稱：', entry.name);
            if (!name || !name.trim()) return;
            var id = genId();
            banks[id] = { name: name.trim(), data: entry.data.slice(), source: '手動建立', createdAt: new Date().toISOString() };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('已另存為題庫：' + name.trim());
        }

        function getActiveBank() { return banks[activeBankId]; }

        function renderBankTabs(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const isEditor = (containerId === 'bank-tabs-editor');
            const highlightId = isEditor ? editorBankId : activeBankId;
            container.innerHTML = '';
            Object.keys(banks).forEach(function(id) {
                const tab = document.createElement('button');
                tab.className = (isEditor ? 'editor-bank-tab' : 'bank-tab') +
                                (id === highlightId ? ' active' : '');
                if (isEditor) {
                    tab.textContent = banks[id].name + ' (' + banks[id].data.length + ' 題)';
                } else {
                    tab.innerHTML = escapeHtml(banks[id].name) +
                        '<span class="tab-count">' + banks[id].data.length + '</span>';
                }
                // 主畫面 tab → 切換作答題庫；編輯區 tab → 僅切換編輯目標，不影響測驗
                tab.onclick = isEditor
                    ? function() { setEditorBank(id); }
                    : function() { switchBank(id); };
                container.appendChild(tab);
            });
        }

        function renderBankInfoBar() {
            var bar = document.getElementById('bank-info-bar');
            if (!bar) return;
            var bank = getActiveBank();
            if (!bank) { bar.style.display = 'none'; return; }
            var source    = bank.source    || '—';
            var createdAt = bank.createdAt ? formatHistoryTime(bank.createdAt) : '—';
            var fromHtml  = (bank.source === '自動創建' && bank.sourceFrom)
                ? '<span>來源題庫：<strong>' + escapeHtml(bank.sourceFrom) + '</strong></span>'
                : '';
            bar.style.display = 'flex';
            bar.innerHTML =
                '<span>題數：<strong>' + bank.data.length + ' 題</strong></span>' +
                '<span>建立時間：<strong>' + createdAt + '</strong></span>' +
                '<span>類型：<strong>' + source + '</strong></span>' +
                fromHtml;
        }

        function setEditorBank(id) {
            editorBankId = id;
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
        }

        function switchBank(id) {
            if (id === activeBankId) {
                // 若還未開始測驗（無進度、剛載入或剛批改完），點選當前題庫也啟動
                if (!quizStarted) startNewQuiz();
                return;
            }

            const hasInput = !quizGraded && quizData.some(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return el && el.value.trim();
            });
            if (hasInput && !confirm('切換題庫將清除目前的作答進度，確定要切換嗎？')) return;

            activeBankId = id;
            editorBankId = id;   // 主畫面切換時，編輯目標跟著對齊
            localStorage.setItem('quiz_active_bank', id);
            localStorage.removeItem('eng_quiz_progress2');
            renderBankInfoBar();

            document.getElementById('stats-container').style.display = 'none';
            document.getElementById('grade-btn').disabled  = true;

            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
            startNewQuiz();

            // 若編輯區已開啟，切換後題目卡增減會讓頁面位移，重新 scroll 回編輯區
            const editorSection = document.getElementById('editor-section');
            if (editorSection.style.display !== 'none') {
                setTimeout(function() {
                    editorSection.scrollIntoView({ behavior: 'smooth' });
                }, 50);
            }
        }

        function addBank() {
            const name = prompt('新題庫名稱：');
            if (!name || !name.trim()) return;
            const id = genId();
            banks[id] = { name: name.trim(), data: [], source: '手動建立', createdAt: new Date().toISOString() };
            saveBanks();
            // 僅切換編輯目標，不影響目前的測驗畫面
            editorBankId = id;
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
        }

        function renameBank() {
            if (!editorBankId || !banks[editorBankId]) return;
            var currentName = banks[editorBankId].name;
            var name = prompt('重新命名題庫：', currentName);
            if (name === null) return;
            name = name.trim();
            if (!name) return alert('題庫名稱不能為空！');
            banks[editorBankId].name = name;
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
        }

        function deleteBank() {
            if (Object.keys(banks).length <= 1) return alert('至少保留一個題庫，無法刪除。');
            if (!confirm('確定要刪除「' + banks[editorBankId].name + '」？此操作無法還原。')) return;
            const wasActive = (editorBankId === activeBankId);
            const keys = Object.keys(banks);
            const idx  = keys.indexOf(editorBankId);
            delete banks[editorBankId];
            saveBanks();
            // 優先選刪除後同位置（原來的下一個），沒有則選前一個
            const remaining = Object.keys(banks);
            editorBankId = remaining[Math.min(idx, remaining.length - 1)];
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            syncEditorContent();
            // 只有刪掉的是作答題庫時才重啟測驗
            if (wasActive) {
                activeBankId = editorBankId;
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                startNewQuiz();
            }
        }

        // 同步編輯區的 textarea
        function syncEditorContent() {
            const bank = banks[editorBankId];
            document.getElementById('raw-input').value =
                bank.data.map(serializeEntry).join('\n');
            editorDirty = false;
        }

        // ── 解鎖 / 關閉編輯區 ───────────────────────────────────────────
        function closeEditor() {
            if (editorDirty) {
                if (!confirm('有未儲存的修改，確定要放棄並關閉編輯區？')) return;
            }
            editorDirty = false;
            document.getElementById('editor-section').style.display = 'none';
            // 還原主畫面元素
            document.getElementById('unlock-editor-btn').style.display = 'block';
            document.getElementById('bank-tabs-main').style.display = '';
            document.getElementById('prep-container').style.display = '';
            document.getElementById('quiz-container').style.display = '';
            document.getElementById('stats-container').style.display = '';
            document.getElementById('bank-info-bar').style.display = '';
            document.querySelector('.btn-group').style.display = '';
            document.getElementById('history-bottom-btn').style.display = '';
            document.getElementById('bottom-mgmt-bar').style.display = '';
            updateHistoryVisibility();
        }

        function unlockEditor() {
            if (quizStarted && quizTyped && !quizGraded) {
                if (!confirm('考試進行中，開啟編輯區後主畫面題庫選擇將暫時隱藏。確定要繼續？')) return;
            }
            const pw = prompt("請輸入管理密碼以編輯題目：");
            if (pw !== null && pw.toLowerCase() === "edit") {
                editorBankId = activeBankId;   // 預設編輯目前作答的題庫
                renderBankTabs('bank-tabs-editor');
                syncEditorContent();
                // 隱藏所有非編輯區元素
                document.getElementById('bank-tabs-main').style.display = 'none';
                document.getElementById('prep-container').style.display = 'none';
                document.getElementById('quiz-container').style.display = 'none';
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('bank-info-bar').style.display = 'none';
                document.querySelector('.btn-group').style.display = 'none';
                document.getElementById('history-section').style.display = 'none';
                document.getElementById('history-bottom-btn').style.display = 'none';
                document.getElementById('bottom-mgmt-bar').style.display = 'none';
                document.getElementById('fab-finish').style.display = 'none';
                document.getElementById('fab-history').style.display = 'none';
                document.getElementById('fab-re-study').style.display = 'none';
                document.getElementById('unlock-editor-btn').style.display = 'none';
                // 顯示編輯區
                document.getElementById('editor-section').style.display = 'block';
                document.getElementById('editor-section').scrollIntoView({ behavior: 'smooth' });
            } else if (pw !== null) {
                alert("密碼錯誤，無法開啟編輯區。");
            }
        }

        function updateVocabulary() {
            const text = document.getElementById('raw-input').value.trim();
            if (!text) return alert("請輸入題目內容！");
            const newData = [];
            try {
                text.split('\n').forEach(function(line) {
                    // 清除批改標注：截掉 tab 後的內容，再移除「輸入 X 為錯誤答案」
                    const cleaned = line.split('\t')[0]
                        .replace(/\s*輸入\s+\S+\s+為錯誤答案.*$/, '').trim();
                    const p = cleaned.split(/\s+/);
                    if (p.length >= 3) {
                        const wr = parseWordRest(p.slice(2).join(' '));
                        newData.push({ no: p[0], word: p[1], pos: wr.pos, zh: wr.zh });
                    }
                });
                if (newData.length === 0) throw new Error();
                if (!confirm('確定要將「' + banks[editorBankId].name + '」更新為 ' + newData.length + ' 題？更新後測驗將重置。')) return;
                banks[editorBankId].data = newData;
                editorDirty = false;
                saveBanks();
                activeBankId = editorBankId;   // 確認更新後，切換作答題庫為剛儲存的題庫
                localStorage.setItem('quiz_active_bank', activeBankId);
                renderBankInfoBar();
                localStorage.removeItem('eng_quiz_progress2');
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('grade-btn').disabled  = true;
                document.getElementById('editor-section').style.display = 'none';
                document.getElementById('unlock-editor-btn').style.display = 'block';
                document.getElementById('bank-tabs-main').style.display = '';
                renderBankTabs('bank-tabs-main');
                startNewQuiz();
                alert("已載入 " + newData.length + " 題，測驗已重置。");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                alert("解析失敗！格式範例：1 word n. 單字");
            }
        }

        // ── 工具函式 ────────────────────────────────────────────────────
        function todayStr() {
            var d = new Date();
            return d.getFullYear() +
                String(d.getMonth() + 1).padStart(2, '0') +
                String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            const s = [...arr];
            for (let i = s.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const t = s[i]; s[i] = s[j]; s[j] = t;
            }
            return s;
        }

        function startNewQuiz() {
            studyStartTime = null;
            studyElapsedMs = 0;
            studySelectedItems = null;
            studySelectedRest  = null;
            quizStarted = true;
            var data = getActiveBank().data;
            if (!data || data.length === 0) {
                quizData = [];
                document.getElementById('quiz-container').innerHTML = '';
                document.getElementById('quiz-container').style.display = 'none';
                document.getElementById('prep-container').innerHTML =
                    '<div class="empty-hint">此題庫尚無題目，請在編輯區新增題目。</div>';
                document.getElementById('fab-finish').style.display = 'none';
                document.getElementById('fab-re-study').style.display = 'none';
                return;
            }
            if (data.length > SPLIT_OPTIONS[0]) {
                showCountSelector();
                return;
            }
            if (data.length > 20) {
                showStudyPrompt();
                return;
            }
            doStartQuiz(data.length);
        }

        // ── 出題數選擇器 ─────────────────────────────────────────────────
        /** 建立 stops 陣列：從 SPLIT_OPTIONS 取小於 total 的值，再加上 total */
        function buildCountStops(total) {
            var stops = [];
            SPLIT_OPTIONS.forEach(function(v) {
                if (v < total) stops.push(v);
            });
            stops.push(total);
            return stops;
        }

        function showCountSelector() {
            var bank  = getActiveBank();
            var total = bank.data.length;
            currentCountStops = buildCountStops(total);
            var defaultVal = currentCountStops.indexOf(50) !== -1 ? 50 : currentCountStops[Math.min(1, currentCountStops.length - 1)];
            currentSelectedCount  = defaultVal;
            currentSelectedRandom = false;

            var seqBtns = currentCountStops.map(function(v) {
                var label = (v === total) ? '全部 ' + v : '前 ' + v;
                return '<button class="count-option-btn' + (v === defaultVal ? ' active' : '') + '"' +
                       ' data-count="' + v + '" data-rand="0" onclick="selectCount(' + v + ',false)">' + label + '</button>';
            }).join('');

            var randBtns = RANDOM_OPTIONS.filter(function(v) { return v < total; }).map(function(v) {
                return '<button class="count-option-btn rand"' +
                       ' data-count="' + v + '" data-rand="1" onclick="selectCount(' + v + ',true)">隨機 ' + v + '</button>';
            }).join('');

            var randSection = randBtns
                ? '<p class="count-group-label">隨機抽題</p><div class="count-options">' + randBtns + '</div>'
                : '';

            document.getElementById('quiz-container').innerHTML = '';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('prep-container').innerHTML =
                '<div class="count-selector-card">' +
                  '<div class="count-title">「' + bank.name + '」共 <strong>' + total + '</strong> 題</div>' +
                  '<div class="count-subtitle">這次要考幾題？</div>' +
                  '<p class="count-group-label">依序（前 N 題）</p>' +
                  '<div class="count-options">' + seqBtns + '</div>' +
                  randSection +
                  '<div class="count-btn-row">' +
                    '<button class="count-study-btn" onclick="startStudyMode()">我先讀一下</button>' +
                    '<button class="count-start-btn" onclick="confirmQuizStart()">開始考試</button>' +
                  '</div>' +
                  '<div id="count-rest-hint"></div>' +
                '</div>';
            document.getElementById('fab-finish').style.display = 'none';
            document.getElementById('fab-re-study').style.display = 'none';
            updateCountRestHint();
            updateHistoryVisibility();
        }

        // 20 < items <= SPLIT_OPTIONS[0]：只問要不要先學習
        function showStudyPrompt() {
            var bank  = getActiveBank();
            var total = bank.data.length;
            currentSelectedCount  = total;
            currentSelectedRandom = false;
            document.getElementById('quiz-container').innerHTML = '';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('prep-container').innerHTML =
                '<div class="count-selector-card">' +
                  '<div class="count-title">「' + escapeHtml(bank.name) + '」共 <strong>' + total + '</strong> 題</div>' +
                  '<div class="count-subtitle">要先複習一下嗎？</div>' +
                  '<div class="count-btn-row">' +
                    '<button class="count-study-btn" onclick="startStudyMode()">我先讀一下</button>' +
                    '<button class="count-start-btn" onclick="confirmQuizStart()">開始考試</button>' +
                  '</div>' +
                '</div>';
            document.getElementById('fab-finish').style.display = 'none';
            document.getElementById('fab-re-study').style.display = 'none';
            updateHistoryVisibility();
        }

        function selectCount(n, isRandom) {
            currentSelectedCount  = n;
            currentSelectedRandom = isRandom;
            document.querySelectorAll('.count-option-btn').forEach(function(btn) {
                var match = parseInt(btn.dataset.count, 10) === n && (btn.dataset.rand === '1') === isRandom;
                btn.classList.toggle('active', match);
            });
            updateCountRestHint();
        }

        function updateCountRestHint() {
            var hint = document.getElementById('count-rest-hint');
            if (!hint) return;
            var bank  = getActiveBank();
            var total = bank ? bank.data.length : 0;
            var n     = currentSelectedCount;
            var rest  = total - n;
            if (rest > 0) {
                hint.textContent = '剩餘 ' + rest + ' 題將自動建立成新題庫';
                hint.style.display = 'block';
            } else {
                hint.textContent = '';
                hint.style.display = 'none';
            }
        }

        function confirmQuizStart() {
            doStartQuiz(currentSelectedCount, currentSelectedRandom);
        }

        // ── 學習模式 ────────────────────────────────────────────────────────
        function startStudyMode() {
            studyStartTime = Date.now();
            var bank     = getActiveBank();
            var allData  = bank.data;
            var items, rangeLabel;

            if (currentSelectedRandom && currentSelectedCount < allData.length) {
                // 現在就隨機抽選，學習與考試使用相同範圍
                var idx      = shuffleArray(allData.map(function(_, i) { return i; }));
                var picked   = idx.slice(0, currentSelectedCount).sort(function(a, b) { return a - b; });
                var pickedSet = {};
                picked.forEach(function(i) { pickedSet[i] = true; });
                studySelectedItems = picked.map(function(i) { return allData[i]; });
                studySelectedRest  = allData.filter(function(_, i) { return !pickedSet[i]; });
                items      = studySelectedItems;
                rangeLabel = '隨機 ' + currentSelectedCount + ' 題';
            } else {
                studySelectedItems = null;
                studySelectedRest  = null;
                items      = allData.slice(0, currentSelectedCount);
                rangeLabel = items.length + ' 題';
            }
            doShowStudyMode(bank, items, rangeLabel);
        }

        // 渲染學習清單（被 startStudyMode 和 reStudyMode 共用）
        function doShowStudyMode(bank, items, rangeLabel) {
            var listHtml = items.map(function(item) {
                var safeWord = item.word.replace(/'/g, "\\'");
                return '<div class="study-item">' +
                    '<span class="study-no">No. ' + item.no + '</span>' +
                    '<span class="speakable" onclick="speakWord(\'' + safeWord + '\')" title="點選發音"> 🔊 ' + escapeHtml(item.word) + '</span>' +
                    '<span class="study-pos-zh">  ' + escapeHtml(item.pos) + ' ' + escapeHtml(item.zh) + '</span>' +
                    '</div>';
            }).join('');
            var footerBtns =
                '<button class="count-start-btn" style="flex:0 0 auto;padding:12px 28px;font-size:15px;" onclick="endStudyMode()">來開始考吧！</button>';
            document.getElementById('quiz-container').innerHTML = '';
            document.getElementById('quiz-container').style.display = 'none';
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('fab-finish').style.display = 'none';
            document.getElementById('fab-re-study').style.display = 'none';
            document.getElementById('prep-container').innerHTML =
                '<div class="study-mode-card">' +
                    '<div class="study-mode-header">' +
                        '<button class="sm-btn" style="background:#7f8c8d;flex-shrink:0;" onclick="cancelStudyMode()">← 回選題數</button>' +
                        '<div class="study-mode-title">📖 ' + escapeHtml(bank.name) + '（' + rangeLabel + '）</div>' +
                    '</div>' +
                    '<div class="study-list">' + listHtml + '</div>' +
                    '<div class="study-mode-footer">' + footerBtns + '</div>' +
                '</div>';
        }

        // 從考試中途回頭複習（不重新拆題庫）
        function reStudyMode() {
            if (quizTyped && !confirm('回頭複習會清空目前的填答內容，確定要繼續？')) return;
            // 以目前考試題目排序後進入學習模式
            studySelectedItems = quizData.slice();  // 原樣保留給 doStartQuiz 重用（rest=[]）
            studySelectedRest  = [];
            studyStartTime     = Date.now();
            var displayItems   = quizData.slice().sort(function(a, b) { return a.no - b.no; });
            doShowStudyMode(getActiveBank(), displayItems, displayItems.length + ' 題');
        }

        function cancelStudyMode() {
            if (studyStartTime !== null) {
                studyElapsedMs += Date.now() - studyStartTime;
                studyStartTime = null;
            }
            studySelectedItems = null;
            studySelectedRest  = null;
            if (getActiveBank().data.length > SPLIT_OPTIONS[0]) {
                showCountSelector();
            } else {
                showStudyPrompt();
            }
        }

        function endStudyMode() {
            if (studyStartTime !== null) {
                studyElapsedMs += Date.now() - studyStartTime;
                studyStartTime = null;
            }
            confirmQuizStart();
        }

        /** 取得題庫的「基底名稱」：去掉末尾的 _數字（題目數），保留其餘部分 */
        function bankBaseName(name) {
            // 去掉末尾的 _題數，並摺疊重複的 _YYYYMMDD（例如 _20260316_20260316 → _20260316）
            return name.replace(/_\d+$/, '').replace(/(_\d{8})(?:_\d{8})+$/, '$1');
        }

        function bankDateBase(name) {
            var base = bankBaseName(name);
            // 若 base 已以 _YYYYMMDD 結尾，直接沿用；否則補上今天日期
            return /_\d{8}$/.test(base) ? base : base + '_' + todayStr();
        }

        function doStartQuiz(n, isRandom) {
            // 若編輯區開啟，先嘗試關閉
            if (isEditorOpen()) {
                if (editorDirty) {
                    if (!confirm('編輯區有未儲存的修改，放棄並開始考試？')) return;
                }
                editorDirty = false;
                document.getElementById('editor-section').style.display = 'none';
                document.getElementById('unlock-editor-btn').style.display = 'block';
                document.getElementById('bank-tabs-main').style.display = '';
            }
            stopFireworks();
            localStorage.removeItem('quiz_last_result');
            var bank    = getActiveBank();
            var allData = bank.data;
            var selected, rest;

            if (studySelectedItems !== null) {
                // 學習模式已預先抽題，直接沿用
                selected = studySelectedItems;
                rest     = studySelectedRest || [];
                studySelectedItems = null;
                studySelectedRest  = null;
            } else if (isRandom && n < allData.length) {
                // 隨機抽 n 題：隨機化索引，取前 n 個；剩餘保持原始順序
                var idx = shuffleArray(allData.map(function(_, i) { return i; }));
                var picked = idx.slice(0, n).sort(function(a, b) { return a - b; });
                var pickedSet = {};
                picked.forEach(function(i) { pickedSet[i] = true; });
                selected = picked.map(function(i) { return allData[i]; });
                rest     = allData.filter(function(_, i) { return !pickedSet[i]; });
            } else {
                selected = allData.slice(0, n);
                rest     = allData.slice(n);
            }

            // 若有剩餘題目：建立「本次 N 題」題庫 + 「剩餘」題庫，封存來源題庫，並切換作答題庫
            if (rest.length > 0) {
                var baseName  = bankDateBase(bank.name);
                var origId    = activeBankId;
                var selId     = genId();
                var remId     = genId();
                banks[selId] = { name: baseName, data: selected.slice(), source: '自動創建', sourceFrom: bank.name, createdAt: new Date().toISOString() };
                banks[remId] = { name: baseName, data: rest,             source: '自動創建', sourceFrom: bank.name, createdAt: new Date().toISOString() };
                // 封存來源題庫（archiveBank 內部會 delete banks[origId] + saveBanks）
                archiveBank(origId, [
                    { name: baseName, count: selected.length },
                    { name: baseName, count: rest.length }
                ]);
                showArchiveToast('已封存「' + bank.name + '」→ 封存清單');
                activeBankId = selId;
                localStorage.setItem('quiz_active_bank', activeBankId);
                renderBankTabs('bank-tabs-main');
                renderBankTabs('bank-tabs-editor');
                renderBankInfoBar();
            }

            quizData      = shuffleArray(selected);
            quizGraded    = false;
            quizStartTime = new Date();
            renderQuiz();
            saveProgress();
        }

        // ── 渲染題目 ─────────────────────────────────────────────────────
        function renderQuiz() {
            quizTyped = false;
            document.getElementById('review-done-bar').style.display = 'none';
            document.getElementById('bank-tabs-main').style.display = '';
            document.getElementById('prep-container').innerHTML = '';
            document.getElementById('quiz-container').style.display = '';
            document.querySelector('.btn-group').style.display = '';
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            quizData.forEach(function(item, idx) {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.id = 'q-' + idx;
                card.innerHTML =
                    '<div class="question-header-row">' +
                    '<div class="question-header">題目 ' + (idx + 1) + '. ' + formatPosZh(item) + '</div>' +
                    '<div class="original-no">No. ' + item.no + '</div>' +
                    '</div>' +
                    '<input type="text" id="input-' + idx + '" placeholder="輸入英文單字..." oninput="onInputChange(' + idx + ')">' +
                    '<button id="show-ans-btn-' + idx + '" class="show-ans-btn" onclick="toggleAnswer(' + idx + ')">顯示答案</button>' +
                    '<div id="ans-info-' + idx + '" class="answer-info">正確答案：<strong class="speakable" onclick="speakWord(\'' + item.word + '\')" title="點選發音">🔊 ' + item.word + '</strong></div>';
                container.appendChild(card);
            });
            document.getElementById('grade-btn').disabled = false;
            document.getElementById('grade-btn').classList.remove('all-done');
            document.getElementById('fab-finish').classList.remove('all-done');
            document.getElementById('fab-finish').style.display = 'block';
            // 顯示「我想再讀一下」懸浮鈕（題數 > 20 才有意義）
            document.getElementById('fab-re-study').style.display =
                quizData.length > 20 ? 'block' : 'none';
            updateHistoryVisibility();
            // 自動 focus 第一題輸入框
            setTimeout(function() {
                var el = document.getElementById('input-0');
                if (el) el.focus();
            }, 80);
        }

        function onInputChange(idx) {
            saveProgress();
            quizTyped = true;
            updateCardBg(idx);
            checkAllFilled();
        }

        function updateCardBg(idx) {
            var el   = document.getElementById('input-' + idx);
            var card = document.getElementById('q-' + idx);
            if (!el || !card || card.classList.contains('correct') || card.classList.contains('wrong')) return;
            if (el.value.length > 0) {
                card.classList.add('answered');
            } else {
                card.classList.remove('answered');
            }
        }

        function checkAllFilled() {
            if (quizData.length === 0) return;
            var allFilled = quizData.every(function(_, idx) {
                var el = document.getElementById('input-' + idx);
                return el && el.value.length > 0;
            });
            document.getElementById('fab-finish').classList.toggle('all-done', allFilled);
            document.getElementById('grade-btn').classList.toggle('all-done', allFilled);
        }

        function saveProgress() {
            const answers = quizData.map(function(_, idx) {
                const el = document.getElementById('input-' + idx);
                return { wordValue: el ? el.value : '' };
            });
            localStorage.setItem('eng_quiz_progress2', JSON.stringify({
                bankId: activeBankId, quizData: quizData, answers: answers
            }));
        }

        // ── 懸浮完成鈕：導航到未填題目，或滾動至批改鈕 ──────────────────
        function fabFinish() {
            if (quizGraded || quizData.length === 0) return;
            let firstEmpty = -1;
            const done = quizData.every(function(_, idx) {
                const w = document.getElementById('input-' + idx).value;
                if (w.length === 0 && firstEmpty === -1) firstEmpty = idx;
                return w.length > 0;
            });
            if (!done) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
            } else {
                document.querySelector('.btn-group').scrollIntoView({ behavior: 'smooth' });
                var gb = document.getElementById('grade-btn');
                gb.classList.remove('ready');
                void gb.offsetWidth;
                gb.classList.add('ready');
            }
        }

        // ── 批改 ─────────────────────────────────────────────────────────
        function gradeQuiz() {
            // 若有未填題目，跳到第一個空白
            var firstEmpty = -1;
            quizData.forEach(function(_, idx) {
                if (firstEmpty !== -1) return;
                var el = document.getElementById('input-' + idx);
                if (el && el.value.length === 0) firstEmpty = idx;
            });
            if (firstEmpty !== -1) {
                document.getElementById('q-' + firstEmpty).scrollIntoView({ behavior: 'smooth' });
                document.getElementById('input-' + firstEmpty).focus();
                return;
            }

            const total  = quizData.length;
            const errors = [];

            quizData.forEach(function(item, idx) {
                const inputWord = document.getElementById('input-' + idx).value.trim();
                const card      = document.getElementById('q-' + idx);
                const isMatch   = inputWord.toLowerCase() === item.word.toLowerCase();

                if (isMatch) {
                    card.classList.add('correct');
                } else {
                    card.classList.add('wrong');
                    document.getElementById('show-ans-btn-' + idx).style.display = 'block';
                    errors.push({ no: item.no, word: item.word, pos: item.pos, zh: item.zh, userWord: inputWord });
                }
            });

            const correctCount = total - errors.length;
            const pct          = Math.round(correctCount / total * 100);
            const statsPanel   = document.getElementById('stats-container');
            statsPanel.style.display = 'block';
            lastErrors = errors;
            var autoErrBank = errors.length > 0 ? createErrorBank() : null;

            // 計時
            var quizEndTime = new Date();
            var timerHtml   = '';
            if (quizStartTime) {
                var elapsed = quizEndTime - quizStartTime;
                var mins    = Math.floor(elapsed / 60000);
                var secs    = Math.floor((elapsed % 60000) / 1000);
                timerHtml =
                    '<div class="quiz-timer-summary">' +
                    '開始 ' + formatClock(quizStartTime) +
                    '　結束 ' + formatClock(quizEndTime) +
                    '　花費 ' + mins + ' 分 ' + secs + ' 秒' +
                    '</div>';
            }

            if (errors.length === 0) {
                // 全對：封存此題庫
                var archivedBankName = getActiveBank() ? getActiveBank().name : '';
                var perfectArchiveId = activeBankId;
                archiveBank(perfectArchiveId, [], '全對');
                // 切換到下一個可用題庫
                var remaining = Object.keys(banks);
                if (remaining.length > 0) {
                    activeBankId = remaining[remaining.length - 1];
                    localStorage.setItem('quiz_active_bank', activeBankId);
                }
                quizStarted = false;
                renderBankTabs('bank-tabs-main');
                renderBankTabs('bank-tabs-editor');

                statsPanel.innerHTML =
                    timerHtml +
                    '<div style="text-align:center;padding:16px 0;">' +
                    '<div style="font-size:3em;line-height:1.3;">🎉</div>' +
                    '<div style="font-size:1.6em;font-weight:bold;color:#27ae60;margin:6px 0;">全部正確！</div>' +
                    '<div style="font-size:1em;color:#555;line-height:1.9;">你很努力，全對了，你很棒！<br>持續練習，你一定可以更進步！</div>' +
                    (archivedBankName ? '<div style="margin-top:10px;font-size:0.88em;color:#27ae60;">此次題庫「' + escapeHtml(archivedBankName) + '」因為全對已封存囉，恭喜！</div>' : '') +
                    '</div>';
                document.getElementById('review-done-btn').textContent = '我要再繼續考 →';
                setTimeout(loopFireworks, 100);
            } else {
                const errorHtml = errors.map(function(e) {
                    var gUrl = 'https://www.google.com/search?q=' + encodeURIComponent(e.word);
                    return '<div class="error-line">' +
                           '<a href="' + gUrl + '" target="_blank" rel="noopener" class="google-btn">G</a>' +
                           '<span class="err-ans"><span class="speakable" onclick="speakWord(\'' + e.word + '\')" title="點選發音">🔊 ' + e.word + '</span> ' + e.no + ' ' + e.pos + ' ' + e.zh + '</span>' +
                           '<span class="err-input">輸入 ' + e.userWord + ' 為錯誤答案</span>' +
                           '</div>';
                }).join('');

                var autoErrMsg = autoErrBank
                    ? '<div class="auto-err-bank-msg" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
                      '已自動建立錯題題庫：<strong>' + escapeHtml(autoErrBank.name) + '</strong>' +
                      '<button onclick="switchBank(\'' + autoErrBank.id + '\')" style="background:#e74c3c;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.9em;font-family:inherit;">現在就繼續考</button>' +
                      '</div>'
                    : '';
                statsPanel.innerHTML =
                    timerHtml +
                    '總共 ' + total + ' 題，正確 ' + correctCount + ' 題，錯誤 ' + errors.length + ' 題。<br>' +
                    '正確比例 ' + pct + '%。錯誤如下：<br><br>' +
                    errorHtml +
                    '<br>加油喔 會一直進步的<br>' +
                    autoErrMsg +
                    '<textarea id="log-textarea" readonly rows="6" style="margin-top:10px;background:#f8f9fa;color:#555;font-size:0.85em;resize:vertical;"></textarea>' +
                    '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">' +
                    '<button onclick="selectLogText()">全選</button>' +
                    '<button onclick="copyLogText()">複製</button>' +
                    '<button id="download-log-btn" onclick="downloadLog()">下載批改記錄</button>' +
                    '</div>';

                generateLog(errors, total, correctCount, pct);
                document.getElementById('log-textarea').value = lastLogContent;
            }

            // 儲存批改畫面（頁面重新整理後可還原）
            localStorage.setItem('quiz_last_result', JSON.stringify({
                statsHtml:   statsPanel.innerHTML,
                logContent:  lastLogContent
            }));

            // 儲存歷史批改記錄
            var histLogText = errors.length === 0
                ? '題庫：' + getActiveBank().name + '\r\n總共 ' + total + ' 題，全部正確！\r\n正確率 100%。'
                : lastLogContent;
            appendHistoryRecord({
                bankName:      getActiveBank().name,
                startTime:     quizStartTime ? quizStartTime.toISOString() : null,
                endTime:       quizEndTime.toISOString(),
                elapsedMs:     quizStartTime ? (quizEndTime - quizStartTime) : 0,
                studyElapsedMs: studyElapsedMs,
                total:         total,
                correct:       correctCount,
                errors:        errors.length,
                logText:       histLogText
            });
            studyElapsedMs = 0;
            studyStartTime = null;
            localStorage.removeItem('eng_quiz_progress2');
            document.getElementById('grade-btn').disabled  = true;
            document.getElementById('grade-btn').classList.remove('all-done');
            document.getElementById('fab-finish').style.display = 'none';
            document.getElementById('fab-re-study').style.display = 'none';
            // 非全對時維持預設按鈕文字
            if (errors.length > 0) {
                document.getElementById('review-done-btn').textContent = '我複習完畢了 →';
            }
            quizGraded  = true;
            quizStarted = false;  // 批改後等待使用者重新點選題庫
            document.getElementById('quiz-container').style.display = 'none';
            document.querySelector('.btn-group').style.display = 'none';
            // 批改後隱藏題庫清單，顯示「我複習完畢了」按鈕
            document.getElementById('bank-tabs-main').style.display = 'none';
            document.getElementById('review-done-bar').style.display = '';
            renderHistory();
            updateHistoryVisibility();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function onReviewDone() {
            document.getElementById('review-done-bar').style.display = 'none';
            document.getElementById('bank-tabs-main').style.display = '';
            localStorage.removeItem('quiz_last_result');
        }

        // ── Log 產生與下載 ────────────────────────────────────────────────
        function generateLog(errors, total, correctCount, pct) {
            const now   = new Date();
            const year  = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day   = String(now.getDate()).padStart(2, '0');
            const hours = now.getHours();
            const mins  = String(now.getMinutes()).padStart(2, '0');
            const secs  = String(now.getSeconds()).padStart(2, '0');
            const ampm  = hours >= 12 ? 'PM' : 'AM';
            const hh    = String(hours).padStart(2, '0');

            const bankName = getActiveBank().name;
            lastLogFilename =
                year + month + day + '_' + ampm + hh + mins + secs + '_' +
                bankName + '_' + total + '題_正確' + correctCount + '題_錯誤' + errors.length + '題.txt';

            const header = '題庫：' + bankName + '\r\n' +
                           '總共 ' + total + ' 題，正確 ' + correctCount + ' 題，錯誤 ' + errors.length + ' 題。\r\n' +
                           '正確比例 ' + pct + '%。錯誤如下：\r\n';
            const lines  = errors.map(function(e) {
                return serializeEntry(e) + '\t輸入 ' + e.userWord + ' 為錯誤答案';
            });
            const footer = '\r\n加油喔 會一直進步的';
            lastLogContent = header + lines.join('\r\n') + footer;
        }

        function downloadLog() {
            const blob = new Blob(['\ufeff' + lastLogContent], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url; a.download = lastLogFilename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        function formatClock(date) {
            return String(date.getHours()).padStart(2, '0') + ':' +
                   String(date.getMinutes()).padStart(2, '0') + ':' +
                   String(date.getSeconds()).padStart(2, '0');
        }

        function createErrorBank() {
            if (!lastErrors || lastErrors.length === 0) return null;
            var errData  = lastErrors.map(function(e) {
                return { no: e.no, word: e.word, pos: e.pos, zh: e.zh };
            });
            var srcName  = getActiveBank().name;
            var errName  = bankDateBase(srcName);
            var errId    = genId();
            banks[errId] = { name: errName, data: errData, source: '自動創建', sourceFrom: srcName, createdAt: new Date().toISOString() };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            return { name: errName, id: errId };
        }

        // ── 還原預設題庫 ──────────────────────────────────────────────────
        function resetToDefaultBanks() {
            if (!confirm('確定要還原預設題庫？\n\n系統會以「名稱前綴 + 題目數量」判斷各預設題庫（V2000、TOEIC、flyer、HardKET）是否存在，\n只補入缺少的部分，不刪除或修改任何既有題庫。')) return;
            var added = restoreDefaultBanks();
            if (added > 0) {
                saveBanks();
                renderBankTabs('bank-tabs-main');
                renderBankTabs('bank-tabs-editor');
                alert('已補入 ' + added + ' 個遺失的預設題庫。');
            } else {
                alert('所有預設題庫（V2000、TOEIC、flyer、HardKET）均已存在，無需還原。');
            }
        }

        // ── 合併題庫 ────────────────────────────────────────────────────
        function mergeBanks() {
            var ids = Object.keys(banks).filter(function(id) { return id !== editorBankId; });
            if (ids.length === 0) return alert('沒有其他題庫可以合併。');
            var list = ids.map(function(id, i) {
                return (i + 1) + '. ' + banks[id].name + ' (' + banks[id].data.length + ' 題)';
            }).join('\n');
            var choice = prompt('選擇要合併到「' + banks[editorBankId].name + '」的題庫：\n\n' + list + '\n\n請輸入編號：');
            if (!choice) return;
            var idx = parseInt(choice) - 1;
            if (isNaN(idx) || idx < 0 || idx >= ids.length) return alert('無效的選擇。');
            var sourceId = ids[idx];
            var srcName  = banks[sourceId].name;
            var srcCount = banks[sourceId].data.length;
            if (!confirm(
                '確定要將「' + srcName + '」的 ' + srcCount + ' 題合併到「' + banks[editorBankId].name + '」？\n\n' +
                '⚠ 注意：來源題庫「' + srcName + '」合併後將被刪除，所有題目號碼將重新編排。'
            )) return;

            // 合併 + 重新編號
            var merged = banks[editorBankId].data.concat(banks[sourceId].data);
            merged.forEach(function(item, i) { item.no = i + 1; });
            banks[editorBankId].data = merged;

            // 刪除來源題庫；若正在作答中則切換到合併目標
            if (sourceId === activeBankId) {
                activeBankId = editorBankId;
                localStorage.setItem('quiz_active_bank', activeBankId);
                localStorage.removeItem('eng_quiz_progress2');
                renderBankInfoBar();
            }
            delete banks[sourceId];
            saveBanks();
            syncEditorContent();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('已合併 ' + srcCount + ' 題（來源題庫「' + srcName + '」已刪除），目前共 ' + banks[editorBankId].data.length + ' 題，編號已重新整理。');
        }

        // ── 下載題庫文字 ──────────────────────────────────────────────
        function downloadBank() {
            var bank = banks[editorBankId];
            var text = bank.data.map(serializeEntry).join('\r\n');
            var blob = new Blob(['\ufeff' + text], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = bank.name + '.txt';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        // ── 另存題庫（以 textarea 當前內容建立新題庫）──────────────────
        function saveAsNewBank() {
            var text = document.getElementById('raw-input').value.trim();
            if (!text) return alert('textarea 中沒有題目內容可儲存！');
            var defaultName = banks[editorBankId] ? banks[editorBankId].name + '_copy' : '新題庫';
            var name = prompt('另存為新題庫，請輸入名稱：', defaultName);
            if (name === null) return;
            name = name.trim();
            if (!name) return alert('題庫名稱不能為空！');
            var newData = [];
            try {
                text.split('\n').forEach(function(line) {
                    var cleaned = line.split('\t')[0]
                        .replace(/\s*輸入\s+\S+\s+為錯誤答案.*$/, '').trim();
                    var p = cleaned.split(/\s+/);
                    if (p.length >= 3) {
                        var wr = parseWordRest(p.slice(2).join(' '));
                        newData.push({ no: p[0], word: p[1], pos: wr.pos, zh: wr.zh });
                    }
                });
                if (newData.length === 0) throw new Error();
            } catch(e) {
                return alert('解析失敗！格式範例：1 word n. 單字');
            }
            var id = genId();
            banks[id] = { name: name, data: newData, source: '手動建立', createdAt: new Date().toISOString() };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('已另存為題庫「' + name + '」，共 ' + newData.length + ' 題。');
        }

        // ── 批改細節另存題庫（解析 currentDetailLogText）────────────────
        function saveDetailAsBank() {
            if (!currentDetailLogText) return alert('沒有可儲存的批改內容！');
            var name = prompt('另存為新題庫，請輸入名稱：', '細節題庫');
            if (name === null) return;
            name = name.trim();
            if (!name) return alert('題庫名稱不能為空！');
            var newData = [];
            currentDetailLogText.split(/\r?\n/).forEach(function(line) {
                var cleaned = line.split('\t')[0]
                    .replace(/\s*輸入\s+\S+\s+為錯誤答案.*$/, '').trim();
                var p = cleaned.split(/\s+/);
                if (p.length >= 3 && /^[a-zA-Z][\w\-']*$/.test(p[1])) {
                    var wr = parseWordRest(p.slice(2).join(' '));
                    newData.push({ no: p[0], word: p[1], pos: wr.pos, zh: wr.zh });
                }
            });
            if (newData.length === 0) return alert('解析不到題目！格式需為：編號 英文 詞性 中文');
            var id = genId();
            banks[id] = { name: name, data: newData, source: '手動建立', createdAt: new Date().toISOString() };
            saveBanks();
            renderBankTabs('bank-tabs-main');
            renderBankTabs('bank-tabs-editor');
            alert('已另存為題庫「' + name + '」，共 ' + newData.length + ' 題。');
        }

        function selectLogText() {
            var ta = document.getElementById('log-textarea');
            if (ta) { ta.focus(); ta.select(); }
        }

        function copyLogText() {
            var ta = document.getElementById('log-textarea');
            if (!ta) return;
            ta.focus(); ta.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(ta.value);
            } else {
                document.execCommand('copy');
            }
        }

        function selectAllBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
        }

        function copyBankText() {
            var ta = document.getElementById('raw-input');
            ta.focus(); ta.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(ta.value);
            } else {
                document.execCommand('copy');
            }
        }

        function toggleAnswer(idx) {
            const info = document.getElementById('ans-info-' + idx);
            info.style.display = info.style.display === 'block' ? 'none' : 'block';
        }

        // ── APP 內建瀏覽器偵測 ───────────────────────────────────────────
        function checkInAppBrowser() {
            var ua  = navigator.userAgent;
            var app = null;
            if (/FBAN|FBAV|FB_IAB|FBIOS/.test(ua))   app = 'Facebook';
            else if (/Line\//i.test(ua))               app = 'LINE';
            else if (/Instagram/.test(ua))             app = 'Instagram';
            else if (/MicroMessenger/.test(ua))        app = 'WeChat';
            if (!app) return;

            var isIOS = /iPhone|iPad|iPod/.test(ua);
            // 清除 openExternalBrowser 參數（供 copy 用）
            var cleanUrl = location.href
                .replace(/[?&]openExternalBrowser=1/, '')
                .replace(/\?$/, '');

            var steps = '';
            if (app === 'LINE') {
                steps = isIOS
                    ? '點右上角 <strong>⋯</strong> → 「在瀏覽器中開啟」<br>或複製下方網址，貼至 Safari 開啟。'
                    : '點右上角 <strong>⋯</strong> → 「以其他瀏覽器開啟」<br>或複製下方網址，貼至 Chrome 開啟。';
            } else if (app === 'Facebook') {
                steps = isIOS
                    ? '點右下角 <strong>⋯</strong> → 「在 Safari 中開啟」'
                    : '點右上角 <strong>⋯</strong> → 「在外部瀏覽器中開啟」';
            } else if (app === 'Instagram') {
                steps = isIOS
                    ? '點右下角 <strong>⋯</strong> → 「在 Safari 中開啟」'
                    : '點右下角 <strong>⋯</strong> → 「在瀏覽器中開啟」';
            } else {
                steps = '請複製下方網址，在 Safari 或 Chrome 中開啟。';
            }

            var banner = document.getElementById('iab-banner');
            banner.innerHTML =
                '<div class="iab-title">⚠ 偵測到 ' + app + ' 內建瀏覽器</div>' +
                '<div>此環境可能無法正常儲存測驗進度與歷史記錄，建議使用外部瀏覽器開啟。</div>' +
                '<div style="margin-top:6px;">' + steps + '</div>' +
                '<div class="iab-url-row">' +
                '<input id="iab-url-input" readonly value="' + cleanUrl + '">' +
                '<button class="iab-copy-btn" onclick="copyIABUrl()">複製網址</button>' +
                '</div>' +
                '<button class="iab-dismiss-btn" onclick="dismissIABBanner()">我知道了，繼續使用</button>';
            banner.style.display = 'block';
        }

        function copyIABUrl() {
            var input = document.getElementById('iab-url-input');
            if (!input) return;
            input.select();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(input.value).then(function () {
                    alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
                }).catch(function () {
                    document.execCommand('copy');
                    alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
                });
            } else {
                document.execCommand('copy');
                alert('已複製！請貼到 Safari 或 Chrome 網址列開啟。');
            }
        }

        function dismissIABBanner() {
            document.getElementById('iab-banner').style.display = 'none';
        }

        // ── 歷史批改記錄 ─────────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function loadHistory() {
            var raw = localStorage.getItem('quiz_grade_history');
            return raw ? JSON.parse(raw) : [];
        }

        function saveHistoryData(records) {
            localStorage.setItem('quiz_grade_history', JSON.stringify(records));
        }

        function appendHistoryRecord(record) {
            var records = loadHistory();
            var nextSeq = records.length > 0 ? records[0].seq + 1 : 1;
            record.seq = nextSeq;
            records.unshift(record);
            if (records.length > 100) records = records.slice(0, 100);
            saveHistoryData(records);
        }

        function formatHistoryTime(isoStr) {
            if (!isoStr) return '-';
            var d = new Date(isoStr);
            return d.getFullYear() + '/' +
                   String(d.getMonth() + 1).padStart(2, '0') + '/' +
                   String(d.getDate()).padStart(2, '0') + ' ' +
                   String(d.getHours()).padStart(2, '0') + ':' +
                   String(d.getMinutes()).padStart(2, '0');
        }

        function renderHistory() {
            var section = document.getElementById('history-section');
            if (!section) return;
            var records = loadHistory();
            var headerHtml = '<div class="history-header"><h3>歷史批改結果</h3><button class="history-close-btn" onclick="closeHistory()" title="關閉">✕</button></div>';
            if (records.length === 0) {
                section.innerHTML = headerHtml + '<div class="history-empty">尚無批改記錄。</div>';
                return;
            }
            var rows = records.map(function(r) {
                var pct     = r.total > 0 ? Math.round(r.correct / r.total * 100) : 0;
                var mins    = Math.floor(r.elapsedMs / 60000);
                var secs    = Math.floor((r.elapsedMs % 60000) / 1000);
                var elapsed = mins + '分' + String(secs).padStart(2, '0') + '秒';
                if (r.studyElapsedMs > 0) {
                    var sm = Math.floor(r.studyElapsedMs / 60000);
                    var ss = Math.floor((r.studyElapsedMs % 60000) / 1000);
                    elapsed += '<br><span style="font-size:0.78em;color:#7f8c8d;">📖學' + sm + '分' + String(ss).padStart(2,'0') + '秒</span>';
                }
                var timeCell = formatHistoryTime(r.startTime) +
                    '<br><span style="font-size:0.82em;color:#555;">' + elapsed + '</span>';
                var ceCell = '<span style="color:#27ae60;font-weight:bold">' + r.correct + '</span>' +
                    '<br><span style="color:#e74c3c;font-weight:bold">' + r.errors + '</span>';
                return '<tr>' +
                    '<td>' + r.seq + '</td>' +
                    '<td style="text-align:left">' + escapeHtml(r.bankName) + ' (' + r.total + ' 題)</td>' +
                    '<td>' + timeCell + '</td>' +
                    '<td>' + ceCell + '</td>' +
                    '<td>' + pct + '%</td>' +
                    '<td><button class="sm-btn" style="background:#3498db;padding:4px 10px;font-size:12px;" ' +
                        'onclick="openDetailModal(' + r.seq + ')">細節</button></td>' +
                    '</tr>';
            }).join('');
            section.innerHTML =
                headerHtml +
                '<table class="history-table">' +
                '<thead><tr>' +
                '<th>#</th><th>題庫</th><th>考試時間</th>' +
                '<th>正確<br><span style="color:#e74c3c;font-weight:normal;">錯誤</span></th><th>正確率</th><th>細節</th>' +
                '</tr></thead>' +
                '<tbody>' + rows + '</tbody>' +
                '</table>';
        }

        var currentDetailLogText = '';

        function parseLogForDisplay(text) {
            return text.split(/\r?\n/).map(function(line) {
                // 錯誤行格式：  "123 word pos zh\t輸入 X 為錯誤答案"
                var m = line.match(/^(\d+\s+)([a-zA-Z][\w\-']*)(.*)$/);
                if (m) {
                    var afterWord = m[3];
                    var tabIdx    = afterWord.indexOf('\t');
                    var mainRest  = tabIdx >= 0 ? afterWord.substring(0, tabIdx) : afterWord;
                    var tail      = tabIdx >= 0 ? afterWord.substring(tabIdx + 1) : '';
                    var safeWord  = m[2].replace(/'/g, "\\'");
                    var gUrl      = 'https://www.google.com/search?q=' + encodeURIComponent(m[2]);
                    return '<a href="' + gUrl + '" target="_blank" rel="noopener" class="google-btn">G</a> ' +
                        escapeHtml(m[1]) +
                        '<span class="speakable" onclick="speakWord(\'' + safeWord + '\')" title="點選發音">🔊 ' + escapeHtml(m[2]) + '</span>' +
                        escapeHtml(mainRest) +
                        (tail ? ' <span style="color:#c0392b;font-size:0.88em;">(' + escapeHtml(tail) + ')</span>' : '');
                }
                return line ? escapeHtml(line) : '&nbsp;';
            }).join('<br>');
        }

        var currentDetailErrBankId = null;

        function findErrorBankForRecord(r) {
            if (!r || !r.bankName || !r.endTime) return null;
            var endMs = new Date(r.endTime).getTime();
            var found = null;
            Object.keys(banks).forEach(function(id) {
                var b = banks[id];
                if (b.source !== '自動創建') return;
                if (b.sourceFrom !== r.bankName) return;
                if (!b.createdAt) return;
                var diff = Math.abs(new Date(b.createdAt).getTime() - endMs);
                if (diff < 90000) found = id;  // 90秒內視為同一次批改產生
            });
            return found;
        }

        function openDetailModal(seq) {
            var records = loadHistory();
            var r = records.find(function(rec) { return rec.seq === seq; });
            if (!r) return;
            currentDetailLogText = r.logText || '';
            currentDetailErrBankId = findErrorBankForRecord(r);
            document.getElementById('detail-modal-title').textContent = r.bankName + ' (' + r.total + ' 題) — 批改細節';
            document.getElementById('detail-modal-content').innerHTML = parseLogForDisplay(currentDetailLogText);
            var errBtn = document.getElementById('detail-err-bank-btn');
            errBtn.style.display = currentDetailErrBankId ? '' : 'none';
            document.getElementById('detail-modal').classList.add('open');
            if (r.errors === 0) setTimeout(loopFireworks, 100);
        }

        function startErrBankFromDetail() {
            if (!currentDetailErrBankId || !banks[currentDetailErrBankId]) return;
            closeDetailModal();
            switchBank(currentDetailErrBankId);
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('open');
        }

        function detailModalBgClick(e) {
            if (e.target.id === 'detail-modal') closeDetailModal();
        }

        function selectDetailText() {
            var ta = document.createElement('textarea');
            ta.value = currentDetailLogText;
            ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;width:1px;height:1px;';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            setTimeout(function() { if (ta.parentNode) ta.parentNode.removeChild(ta); }, 3000);
        }

        function copyDetailText() {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(currentDetailLogText);
            } else {
                selectDetailText();
                document.execCommand('copy');
            }
        }

        function closeHistory() {
            document.getElementById('history-section').style.display = 'none';
        }

        function showHistoryAndScroll() {
            if (quizStarted && quizTyped && !quizGraded) {
                if (!confirm('考試進行中，確定要放棄目前作答並查看批改記錄？')) return;
            }
            renderHistory();
            var section = document.getElementById('history-section');
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ── 煙火動畫（全對時觸發，持續 60 秒）───────────────────────────
        function stopFireworks() {
            if (fireworksTimer !== null) {
                clearTimeout(fireworksTimer);
                fireworksTimer = null;
            }
        }

        function loopFireworks() {
            stopFireworks();
            var deadline = Date.now() + 60000;
            function fire() {
                showFireworks();
                if (Date.now() < deadline) {
                    fireworksTimer = setTimeout(fire, 4600);
                } else {
                    fireworksTimer = null;
                }
            }
            fire();
        }

        function showFireworks() {
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:900;overflow:hidden;';
            document.body.appendChild(overlay);

            var colors = ['#f1c40f','#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c','#e91e63','#f39c12'];
            var W = window.innerWidth, H = window.innerHeight;

            // 6 個煙火爆炸點（螢幕比例座標）
            var burstPos = [
                [0.2, 0.28], [0.5, 0.18], [0.78, 0.28],
                [0.33, 0.52], [0.67, 0.48], [0.5, 0.68]
            ];

            burstPos.forEach(function(pos, bi) {
                setTimeout(function() {
                    var cx = pos[0] * W, cy = pos[1] * H;
                    var baseColor = colors[bi % colors.length];
                    for (var i = 0; i < 18; i++) {
                        var angle = (2 * Math.PI * i) / 18 + (Math.random() * 0.3);
                        var dist  = 65 + Math.random() * 65;
                        var dx    = Math.cos(angle) * dist;
                        var dy    = Math.sin(angle) * dist;
                        var size  = 5 + Math.random() * 6;
                        var color = Math.random() > 0.45 ? baseColor : colors[Math.floor(Math.random() * colors.length)];
                        var dur   = (0.75 + Math.random() * 0.45).toFixed(2);
                        var delay = (Math.random() * 0.08).toFixed(3);

                        var dot = document.createElement('div');
                        dot.style.cssText = [
                            'position:absolute',
                            'left:' + (cx - size / 2) + 'px',
                            'top:'  + (cy - size / 2) + 'px',
                            'width:'  + size + 'px',
                            'height:' + size + 'px',
                            'border-radius:50%',
                            'background:' + color,
                            '--dx:' + dx + 'px',
                            '--dy:' + dy + 'px',
                            'animation:fw-fly ' + dur + 's ease-out ' + delay + 's forwards'
                        ].join(';');
                        overlay.appendChild(dot);
                    }
                }, bi * 240);
            });

            setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 4200);
        }

        // ── 單字發音（Web Speech API，iOS/Android 均支援）────────────────
        function speakWord(word) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            var utt = new SpeechSynthesisUtterance(word);
            utt.lang = 'en-US';
            window.speechSynthesis.speak(utt);
        }

        function isEditorOpen() {
            return document.getElementById('editor-section').style.display !== 'none';
        }

        function updateHistoryVisibility() {
            var show = !quizStarted && !isEditorOpen();
            document.getElementById('history-section').style.display = show ? 'block' : 'none';
            var hasHistory = loadHistory().length > 0;
            document.getElementById('fab-history').style.display = (show && hasHistory) ? 'block' : 'none';
        }
    </script>
</body>
</html>
